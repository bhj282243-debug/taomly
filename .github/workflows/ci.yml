name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"

jobs:

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install ruff
        run: pip install ruff==0.8.4
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install pip-audit
        run: pip install pip-audit==2.7.3
      - name: Audit dependencies for known CVEs
        run: pip-audit -r requirements.txt --progress-spinner off

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    env:
      DATABASE_URL: "sqlite:///:memory:"
      SECRET_KEY: "ci-secret-key-minimum-32-characters-ok"
      WEBHOOK_URL: "https://test.taomly.uz"
      BOT_TOKEN: ""
      SENTRY_DSN: ""
      SUPERADMIN_EMAIL: "superadmin@taomly.uz"
      # SUPERADMIN_PASSWORD_HASH генерируется динамически в шаге ниже
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Generate FERNET_KEY for tests
        run: |
          FERNET_KEY=$(python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
          echo "FERNET_KEY=$FERNET_KEY" >> $GITHUB_ENV
      - name: Generate SUPERADMIN_PASSWORD_HASH for tests
        run: |
          SUPERADMIN_PASSWORD_HASH=$(python -c "from passlib.context import CryptContext; print(CryptContext(schemes=['bcrypt'], deprecated='auto').hash('ci-test-password'))")
          echo "SUPERADMIN_PASSWORD_HASH=$SUPERADMIN_PASSWORD_HASH" >> $GITHUB_ENV
      - name: Run tests
        run: |
          pytest tests/ --cov=. --cov-report=xml --cov-report=term-missing -v
      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml
          fail_ci_if_error: false

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: taomly:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
