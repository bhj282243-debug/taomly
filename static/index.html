<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Taomly</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg:          #FAF7F1;
  --card:        #FFFFFF;
  --surface:     #F3ECDF;
  --ink:         #241B17;
  --ink-soft:    #8A7A6D;
  --ruby:        #7A1530;
  --ruby-deep:   #5E0F25;
  --gold:        #B68A3F;
  --gold-soft:   #C9A14A;
  --line:        rgba(36,27,23,0.09);
  --line-strong: rgba(36,27,23,0.16);
  --shadow-sm:   0 1px 3px rgba(36,27,23,0.06), 0 1px 2px rgba(36,27,23,0.04);
  --shadow-md:   0 8px 24px rgba(36,27,23,0.08), 0 2px 6px rgba(36,27,23,0.05);
  --shadow-ruby: 0 10px 30px rgba(122,21,48,0.28);
  --radius-lg:   20px;
  --radius-md:   16px;
  --radius-sm:   12px;
}

body {
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

svg { display:block; }
.icon { width:18px; height:18px; stroke:currentColor; stroke-width:1.6; fill:none; stroke-linecap:round; stroke-linejoin:round; }

/* ─── SPLASH ─── */
#splash {
  position:fixed; inset:0;
  background:var(--bg);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:999; transition:opacity 0.5s ease;
}
#splash.hidden { opacity:0; pointer-events:none; }

.splash-mark {
  width:64px; height:64px;
  display:flex; align-items:center; justify-content:center;
  margin-bottom:24px;
  border-radius:18px;
  background:var(--ruby);
  box-shadow:var(--shadow-ruby);
}
.splash-mark svg { width:30px; height:30px; stroke:#FAF7F1; stroke-width:1.4; }

.splash-name {
  font-family:'Playfair Display',serif;
  font-size:30px; font-weight:700;
  color:var(--ink); letter-spacing:0.2px;
}
.splash-tagline {
  font-size:13px; font-weight:500;
  color:var(--ink-soft); margin-top:6px;
  letter-spacing:0.3px;
}

/* ─── HEADER ─── */
.header {
  background:var(--bg);
  position:sticky; top:0; z-index:100;
  padding:18px 20px 0;
}

.restaurant-row {
  display:flex; align-items:center; gap:14px;
  padding-bottom:18px;
}
.restaurant-logo {
  width:52px; height:52px; border-radius:16px;
  background:var(--ruby);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
  box-shadow:var(--shadow-ruby);
}
.restaurant-logo-letter {
  font-family:'Playfair Display',serif;
  font-size:22px; font-weight:700; color:#FAF7F1;
}
.restaurant-name {
  font-family:'Playfair Display',serif;
  font-size:21px; font-weight:700; color:var(--ink);
  letter-spacing:0.1px; line-height:1.2;
}
.restaurant-address {
  font-size:13px; color:var(--ink-soft); margin-top:3px;
  display:flex; align-items:center; gap:5px;
}
.restaurant-address .icon { width:13px; height:13px; flex-shrink:0; }
.table-badge {
  display:inline-flex; align-items:center; gap:6px;
  margin-top:7px; padding:4px 11px;
  border-radius:9px; background:var(--surface);
  font-size:12px; font-weight:600; color:var(--ruby);
}
.table-badge .icon { width:13px; height:13px; }

/* ─── CATEGORIES ─── */
.categories-scroll {
  display:flex; gap:8px; overflow-x:auto;
  padding-bottom:14px; scrollbar-width:none;
}
.categories-scroll::-webkit-scrollbar { display:none; }
.cat-btn {
  flex-shrink:0; padding:9px 18px; border-radius:100px;
  border:1px solid var(--line);
  background:var(--card);
  font-family:'Inter',sans-serif;
  font-size:13.5px; font-weight:600;
  color:var(--ink-soft); cursor:pointer;
  transition:all 0.18s ease; white-space:nowrap;
}
.cat-btn.active {
  background:var(--ruby);
  border-color:var(--ruby);
  color:#FAF7F1;
  box-shadow:0 4px 14px rgba(122,21,48,0.28);
}

/* ─── MAIN CONTENT ─── */
.main { padding:8px 20px 140px; }
.category-section { margin-bottom:30px; scroll-margin-top: 132px; }

.category-title-wrap {
  display:flex; align-items:baseline; gap:8px; margin-bottom:16px;
}
.category-title {
  font-family:'Playfair Display',serif;
  font-size:19px; font-weight:700; color:var(--ink);
  letter-spacing:0.1px;
}
.category-count {
  font-size:12.5px; color:var(--ink-soft); font-weight:500;
}

.products-grid { display:flex; flex-direction:column; gap:12px; }

/* ─── PRODUCT CARD ─── */
.product-card {
  background:var(--card);
  border-radius:var(--radius-lg);
  display:flex; align-items:center; gap:14px; padding:12px;
  transition:transform 0.15s ease, box-shadow 0.15s ease;
  cursor:pointer;
  box-shadow:var(--shadow-sm);
}
.product-card:active {
  transform:scale(0.98);
  box-shadow:var(--shadow-md);
}

.product-img {
  width:88px; height:88px; border-radius:var(--radius-md);
  background:var(--surface); flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
}
.product-img img { width:100%; height:100%; object-fit:cover; }
.product-img-placeholder {
  width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
}
.product-img-placeholder .icon { width:30px; height:30px; stroke:var(--gold-soft); opacity:0.55; stroke-width:1.3; }

.product-info { flex:1; min-width:0; }
.product-name {
  font-size:14.5px; font-weight:600; color:var(--ink);
  margin-bottom:4px; line-height:1.3;
}
.product-desc {
  font-size:12.5px; color:var(--ink-soft); line-height:1.4;
  margin-bottom:10px;
  overflow:hidden; display:-webkit-box;
  -webkit-line-clamp:2; -webkit-box-orient:vertical;
}
.product-footer { display:flex; align-items:center; justify-content:space-between; }
.product-price {
  font-family:'Playfair Display',serif;
  font-size:17px; font-weight:600;
  color:var(--ink); line-height:1;
}

.add-btn {
  width:32px; height:32px; border-radius:50%;
  background:var(--ruby); border:none;
  color:#FAF7F1;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:transform 0.12s ease, background 0.12s ease;
  box-shadow:0 3px 10px rgba(122,21,48,0.3);
  flex-shrink:0;
}
.add-btn .icon { width:16px; height:16px; stroke-width:2.2; }
.add-btn:active { transform:scale(0.88); background:var(--ruby-deep); }

.qty-control {
  display:flex; align-items:center; gap:2px;
  background:var(--surface); border-radius:100px; padding:3px;
}
.qty-btn {
  width:26px; height:26px; border-radius:50%;
  border:none;
  background:var(--card); color:var(--ruby);
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 1px 3px rgba(36,27,23,0.12);
}
.qty-btn .icon { width:13px; height:13px; stroke-width:2.4; }
.qty-num {
  font-size:14px; font-weight:700; color:var(--ink);
  min-width:22px; text-align:center;
}

/* ─── CART BAR ─── */
.cart-bar {
  position:fixed; bottom:0; left:0; right:0;
  padding:14px 20px 28px;
  background:linear-gradient(to top, var(--bg) 55%, transparent);
  z-index:200;
  transform:translateY(120%);
  transition:transform 0.32s cubic-bezier(0.32,0.96,0.5,1);
}
.cart-bar.visible { transform:translateY(0); }
.cart-btn {
  width:100%; padding:16px 20px;
  background:var(--ruby);
  border:none;
  border-radius:var(--radius-md); color:#FAF7F1;
  font-family:'Inter',sans-serif;
  font-size:15px; font-weight:700; cursor:pointer;
  display:flex; align-items:center; justify-content:space-between;
  box-shadow:var(--shadow-ruby);
}
.cart-btn-left { display:flex; align-items:center; gap:10px; }
.cart-count-badge {
  background:rgba(250,247,241,0.18);
  border-radius:8px; padding:3px 9px;
  font-size:13px; font-weight:700;
}
.cart-total-text {
  font-family:'Playfair Display',serif;
  font-size:17px; font-weight:600;
}

/* ─── SCREENS ─── */
.screen {
  display:none; position:fixed; inset:0;
  background:var(--bg); z-index:300; overflow-y:auto;
  animation:slideUp 0.26s cubic-bezier(0.32,0.96,0.5,1);
}
.screen.active { display:block; }
@keyframes slideUp {
  from { transform:translateY(20px); opacity:0; }
  to   { transform:translateY(0); opacity:1; }
}

.screen-header {
  background:var(--bg);
  padding:18px 20px;
  display:flex; align-items:center; gap:14px;
  position:sticky; top:0; z-index:10;
}
.back-btn {
  width:38px; height:38px; border-radius:12px;
  border:none;
  background:var(--card); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  color:var(--ink);
  box-shadow:var(--shadow-sm);
}
.back-btn .icon { width:18px; height:18px; }
.screen-title {
  font-family:'Playfair Display',serif;
  font-size:19px; font-weight:700; color:var(--ink);
}

/* ─── CART ITEMS ─── */
.cart-items { padding:4px 20px 16px; display:flex; flex-direction:column; gap:10px; }
.cart-item {
  background:var(--card);
  border-radius:var(--radius-md); padding:12px 14px;
  display:flex; align-items:center; gap:12px;
  box-shadow:var(--shadow-sm);
}
.cart-item-gem {
  width:42px; height:42px; border-radius:var(--radius-sm);
  background:var(--surface);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.cart-item-gem .icon { width:18px; height:18px; stroke:var(--gold-soft); }
.cart-item-info { flex:1; min-width:0; }
.cart-item-name { font-size:14px; font-weight:600; color:var(--ink); }
.cart-item-price {
  font-size:13px; color:var(--ink-soft); margin-top:3px;
}

/* ─── ORDER TYPE ─── */
.order-type-section { padding:8px 20px 18px; }
.section-label {
  font-size:11.5px; font-weight:700; color:var(--ink-soft);
  text-transform:uppercase; letter-spacing:1.2px; margin-bottom:11px;
}
.order-type-btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.type-btn {
  padding:16px 10px; border-radius:var(--radius-md);
  border:1.5px solid var(--line);
  background:var(--card); text-align:center; cursor:pointer;
  transition:all 0.18s ease;
}
.type-btn.active {
  border-color:var(--ruby);
  background:rgba(122,21,48,0.05);
  box-shadow:0 4px 16px rgba(122,21,48,0.1);
}
.type-btn-icon {
  width:30px; height:30px; margin:0 auto 8px;
  display:flex; align-items:center; justify-content:center;
}
.type-btn-icon .icon { width:24px; height:24px; stroke:var(--ruby); stroke-width:1.5; }
.type-btn-label { font-size:13.5px; font-weight:600; color:var(--ink); }

.table-info-banner {
  margin:0 20px 18px; padding:16px 18px;
  background:var(--surface);
  border-radius:var(--radius-md); display:flex; align-items:center; gap:14px;
}
.table-info-banner-icon {
  width:38px; height:38px; border-radius:11px;
  background:var(--card); flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
}
.table-info-banner-icon .icon { width:19px; height:19px; stroke:var(--ruby); }
.table-info-banner-title { font-size:14.5px; font-weight:700; color:var(--ink); }
.table-info-banner-sub { font-size:12.5px; color:var(--ink-soft); margin-top:2px; }

/* ─── FORM ─── */
.form-section { padding:0 20px 18px; display:flex; flex-direction:column; gap:10px; }
.form-input {
  width:100%; padding:15px 16px; border-radius:var(--radius-md);
  border:1.5px solid var(--line);
  background:var(--card); font-size:15px; color:var(--ink);
  outline:none; transition:border-color 0.15s ease;
  font-family:'Inter',sans-serif;
}
.form-input:focus { border-color:var(--ruby); }
.form-input::placeholder { color:var(--ink-soft); opacity:0.7; }
.form-textarea { resize:none; height:78px; }

/* ─── SUMMARY ─── */
.summary-card {
  margin:0 20px 18px; background:var(--card);
  border-radius:var(--radius-md); padding:16px 18px;
  box-shadow:var(--shadow-sm);
}
.summary-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:6px 0; font-size:14px; color:var(--ink-soft);
}
.summary-row.total {
  border-top:1px solid var(--line); margin-top:6px; padding-top:13px;
  font-size:15px; font-weight:700; color:var(--ink);
}
.summary-row.total span:last-child {
  font-family:'Playfair Display',serif;
  font-size:21px; font-weight:600; color:var(--ruby);
}

.checkout-btn {
  margin:0 20px 40px; width:calc(100% - 40px); padding:17px;
  background:var(--ruby);
  border:none;
  border-radius:var(--radius-md); color:#FAF7F1;
  font-family:'Inter',sans-serif;
  font-size:15.5px; font-weight:700; cursor:pointer;
  transition:transform 0.1s ease;
  box-shadow:var(--shadow-ruby);
}
.checkout-btn:active { transform:scale(0.98); }
.checkout-btn:disabled { opacity:0.5; cursor:not-allowed; }

/* ─── SUCCESS ─── */
#successScreen.active {
  display:flex !important; flex-direction:column; align-items:center;
  justify-content:center; min-height:100vh; padding:32px; text-align:center;
}
.success-anim {
  width:84px; height:84px;
  background:var(--ruby); border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  margin-bottom:26px;
  animation:popIn 0.45s cubic-bezier(0.32,1.4,0.5,1);
  box-shadow:var(--shadow-ruby);
}
.success-anim .icon { width:38px; height:38px; stroke:#FAF7F1; stroke-width:2; }
@keyframes popIn { from { transform:scale(0); opacity:0; } to { transform:scale(1); opacity:1; } }
.success-title {
  font-family:'Playfair Display',serif;
  font-size:25px; font-weight:700; color:var(--ink); margin-bottom:10px;
}
.success-subtitle { font-size:14.5px; color:var(--ink-soft); line-height:1.5; margin-bottom:30px; }
.success-order-id {
  background:var(--card);
  border-radius:var(--radius-md); padding:16px 30px;
  font-size:12.5px; color:var(--ink-soft); margin-bottom:30px;
  box-shadow:var(--shadow-sm);
}
.success-order-id strong {
  font-family:'Playfair Display',serif;
  color:var(--ruby);
  font-size:28px; display:block; margin-top:5px;
}
.back-to-menu-btn {
  padding:16px 42px;
  background:var(--ruby);
  border:none;
  border-radius:var(--radius-md); color:#FAF7F1;
  font-family:'Inter',sans-serif;
  font-size:15px; font-weight:700; cursor:pointer;
  box-shadow:var(--shadow-ruby);
}

/* ─── UTILS ─── */
.loading {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; min-height:60vh; gap:16px;
  color:var(--ink-soft); font-size:14px;
}
.spinner {
  width:34px; height:34px;
  border:2.5px solid var(--line);
  border-top-color:var(--ruby);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.error-msg { text-align:center; padding:40px 20px; color:var(--ink-soft); font-size:14px; line-height:1.6; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration:0.01ms !important; transition-duration:0.01ms !important; }
}
</style>
</head>
<body>

<!-- ─── SPLASH ─── -->
<div id="splash">
  <div class="splash-mark">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M5 3v18M5 3c0 3 3 3 3 6s-3 3-3 6M19 3v18M19 8h-3a2 2 0 0 0 0 4h3"/></svg>
  </div>
  <div class="splash-name" id="splashName">Taomly</div>
  <div class="splash-tagline">Mazali taomlar buyurtmasi</div>
</div>

<!-- ─── MENU SCREEN ─── -->
<div id="menuScreen">
  <div class="header">
    <div class="restaurant-row">
      <div class="restaurant-logo">
        <div class="restaurant-logo-letter" id="restaurantLetter">T</div>
      </div>
      <div>
        <div class="restaurant-name" id="restaurantName">Yuklanmoqda...</div>
        <div class="restaurant-address" id="restaurantAddress"></div>
        <div id="tableBadge" style="display:none;" class="table-badge">
          <svg class="icon" viewBox="0 0 24 24"><path d="M3 9h18M3 9v10M21 9v10M3 19h18M7 9V5a1 1 0 0 1 1-1h8a1 1 0 0 1 1 1v4"/></svg>
          <span id="tableBadgeText"></span>
        </div>
      </div>
    </div>
    <div class="categories-scroll" id="categoriesNav"></div>
  </div>
  <div class="main" id="menuContent">
    <div class="loading"><div class="spinner"></div>Menyu yuklanmoqda...</div>
  </div>
</div>

<!-- ─── CART SCREEN ─── -->
<div id="cartScreen" class="screen">
  <div class="screen-header">
    <button class="back-btn" onclick="closeCart()">
      <svg class="icon" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <span class="screen-title">Savat</span>
  </div>
  <div class="cart-items" id="cartItemsList"></div>

  <div class="order-type-section" id="orderTypeSection">
    <div class="section-label">Buyurtma turi</div>
    <div class="order-type-btns">
      <div class="type-btn active" id="typeDelivery" onclick="selectType('delivery')">
        <div class="type-btn-icon"><svg class="icon" viewBox="0 0 24 24"><circle cx="6" cy="19" r="2"/><circle cx="17" cy="19" r="2"/><path d="M4 19h2l1.5-9H17l3 6h-2M7.5 10L6 5H3"/></svg></div>
        <div class="type-btn-label">Yetkazib berish</div>
      </div>
      <div class="type-btn" id="typeTakeaway" onclick="selectType('takeaway')">
        <div class="type-btn-icon"><svg class="icon" viewBox="0 0 24 24"><path d="M4 9h16l-1.5 11a1 1 0 0 1-1 .9H6.5a1 1 0 0 1-1-.9L4 9zM8 9V6a4 4 0 0 1 8 0v3"/></svg></div>
        <div class="type-btn-label">Olib ketish</div>
      </div>
    </div>
  </div>

  <div class="table-info-banner" id="tableBanner" style="display:none;">
    <div class="table-info-banner-icon">
      <svg class="icon" viewBox="0 0 24 24"><path d="M3 9h18M3 9v10M21 9v10M3 19h18M7 9V5a1 1 0 0 1 1-1h8a1 1 0 0 1 1 1v4"/></svg>
    </div>
    <div>
      <div class="table-info-banner-title" id="tableBannerTitle">Stol №1</div>
      <div class="table-info-banner-sub">Buyurtma stolga yetkaziladi</div>
    </div>
  </div>

  <div class="form-section">
    <input class="form-input" type="text" id="clientName" placeholder="Ismingiz" />
    <input class="form-input" type="tel" id="clientPhone" placeholder="+998 XX XXX XX XX" value="+998" />
    <input class="form-input" type="text" id="clientAddress" placeholder="Manzil (yetkazib berish uchun)" />
    <textarea class="form-input form-textarea" id="clientComment" placeholder="Izoh (ixtiyoriy)"></textarea>
  </div>

  <div class="summary-card">
    <div class="summary-row">
      <span id="summaryCount">0 ta taom</span>
      <span id="summarySubtotal">0 so'm</span>
    </div>
    <div class="summary-row total">
      <span>Jami</span>
      <span id="summaryTotal">0 so'm</span>
    </div>
  </div>
  <button class="checkout-btn" id="checkoutBtn" onclick="submitOrder()">Buyurtma berish →</button>
</div>

<!-- ─── SUCCESS SCREEN ─── -->
<div id="successScreen" class="screen">
  <div class="success-anim">
    <svg class="icon" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
  </div>
  <div class="success-title">Buyurtma qabul qilindi!</div>
  <div class="success-subtitle" id="successSubtitle">Tez orada siz bilan bog'lanamiz.</div>
  <div class="success-order-id">
    Buyurtma raqami
    <strong id="successOrderId">#0000</strong>
  </div>
  <button class="back-to-menu-btn" onclick="backToMenu()">Menyuga qaytish</button>
</div>

<!-- ─── CART BAR ─── -->
<div class="cart-bar" id="cartBar">
  <button class="cart-btn" onclick="openCart()">
    <div class="cart-btn-left">
      <span>Savat</span>
      <span class="cart-count-badge" id="cartCountBadge">0</span>
    </div>
    <span class="cart-total-text" id="cartTotalBar">0 so'm</span>
  </button>
</div>

<script>
const API_BASE = '';
const DEFAULT_SLUG = 'chinar';

let restaurant = null;
let cart = {};
let orderType = 'delivery';
let tableNumber = null;
let tableDbId = null;
let restaurantSlug = DEFAULT_SLUG;

const placeholderSVG = `<div class="product-img-placeholder"><svg class="icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18 8a4 4 0 0 1 0 8M6 4v16M6 4c0 2.5 2.5 2.5 2.5 5S6 11.5 6 14"/></svg></div>`;

function parseParams() {
  const urlParams = new URLSearchParams(window.location.search);
  const slugParam = urlParams.get('slug');
  const tableParam = urlParams.get('table');
  if (slugParam) {
    restaurantSlug = slugParam;
    if (tableParam) { tableNumber = tableParam; orderType = 'dine_in'; }
    return;
  }
  const tg = window.Telegram?.WebApp;
  const startParam = tg?.initDataUnsafe?.start_param || '';
  if (startParam) {
    const parts = startParam.split('_');
    if (parts.length >= 2 && !isNaN(parts[parts.length - 1])) {
      tableNumber = parts[parts.length - 1];
      restaurantSlug = parts.slice(0, -1).join('_');
      orderType = 'dine_in';
    } else { restaurantSlug = startParam; }
  }
}

function fmt(p) { return p.toLocaleString('uz-UZ') + ' so\'m'; }

async function loadMenu() {
  try {
    const res = await fetch(`${API_BASE}/api/restaurants/${restaurantSlug}`);
    if (!res.ok) throw new Error('Server xatosi');
    restaurant = await res.json();

    document.getElementById('splashName').textContent = restaurant.name;
    document.getElementById('restaurantName').textContent = restaurant.name;
    document.getElementById('restaurantAddress').textContent = restaurant.address || '';

    // первая буква в логотипе
    const letter = restaurant.name ? restaurant.name[0].toUpperCase() : '✦';
    document.getElementById('restaurantLetter').textContent = letter;

    if (tableNumber) {
      document.getElementById('tableBadgeText').textContent = 'Stol №' + tableNumber;
      document.getElementById('tableBadge').style.display = 'inline-flex';
      await resolveTableId();
    }

    renderCategories();
    renderMenu();

    setTimeout(() => {
      document.getElementById('splash').classList.add('hidden');
    }, 1400);

  } catch (e) {
    document.getElementById('menuContent').innerHTML =
      `<div class="error-msg">Menyu yuklanmadi.<br>Qayta urinib ko'ring.</div>`;
    document.getElementById('splash').classList.add('hidden');
  }
}

async function resolveTableId() {
  try {
    const res = await fetch(`${API_BASE}/api/restaurants/${restaurantSlug}/table/${tableNumber}`);
    if (res.ok) { const data = await res.json(); tableDbId = data.table_id; }
  } catch (e) { tableDbId = null; }
}

function renderCategories() {
  const nav = document.getElementById('categoriesNav');
  nav.innerHTML = '';
  restaurant.categories.forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (i === 0 ? ' active' : '');
    btn.textContent = cat.name;
    btn.onclick = () => {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const el = document.getElementById('cat-' + cat.id);
      if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
    };
    nav.appendChild(btn);
  });
}

function renderMenu() {
  const content = document.getElementById('menuContent');
  content.innerHTML = '';
  restaurant.categories.forEach((cat) => {
    if (!cat.products || cat.products.length === 0) return;
    const sec = document.createElement('div');
    sec.className = 'category-section';
    sec.id = 'cat-' + cat.id;
    sec.innerHTML = `
      <div class="category-title-wrap">
        <div class="category-title">${cat.name}</div>
        <div class="category-count">${cat.products.length} ta taom</div>
      </div>
      <div class="products-grid" id="grid-${cat.id}"></div>`;
    content.appendChild(sec);
    const grid = sec.querySelector('#grid-' + cat.id);
    cat.products.forEach(p => grid.appendChild(makeCard(p)));
  });
}

function makeCard(p) {
  const div = document.createElement('div');
  div.className = 'product-card';
  div.id = 'card-' + p.id;
  const qty = cart[p.id]?.qty || 0;
  const imgHtml = p.photo_url
    ? `<img src="${p.photo_url}" alt="${p.name}">`
    : placeholderSVG;
  div.innerHTML = `
    <div class="product-img">${imgHtml}</div>
    <div class="product-info">
      <div class="product-name">${p.name}</div>
      ${p.description ? `<div class="product-desc">${p.description}</div>` : ''}
      <div class="product-footer">
        <div class="product-price">${fmt(p.price)}</div>
        <div id="ctrl-${p.id}">${ctrlHtml(p, qty)}</div>
      </div>
    </div>`;
  return div;
}

function ctrlHtml(p, qty) {
  if (qty === 0) return `<button class="add-btn" onclick="addItem(${p.id})"><svg class="icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>`;
  return `<div class="qty-control">
    <button class="qty-btn" onclick="changeQty(${p.id},-1)"><svg class="icon" viewBox="0 0 24 24"><path d="M5 12h14"/></svg></button>
    <span class="qty-num">${qty}</span>
    <button class="qty-btn" onclick="changeQty(${p.id},1)"><svg class="icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
  </div>`;
}

function findProduct(id) {
  for (const cat of restaurant.categories) {
    const p = cat.products.find(p => p.id === id);
    if (p) return p;
  }
  return null;
}

function addItem(id) {
  const p = findProduct(id);
  if (!p) return;
  cart[id] = { id, name:p.name, price:p.price, qty:1 };
  refreshCtrl(id); updateBar();
}

function changeQty(id, delta) {
  if (!cart[id]) return;
  cart[id].qty += delta;
  if (cart[id].qty <= 0) delete cart[id];
  refreshCtrl(id); updateBar();
}

function refreshCtrl(id) {
  const el = document.getElementById('ctrl-' + id);
  if (!el) return;
  const p = findProduct(id);
  if (!p) return;
  el.innerHTML = ctrlHtml(p, cart[id]?.qty || 0);
}

function cartItems() { return Object.values(cart); }
function cartTotal() { return cartItems().reduce((s,i) => s + i.price * i.qty, 0); }
function cartCount() { return cartItems().reduce((s,i) => s + i.qty, 0); }

function updateBar() {
  const n = cartCount();
  document.getElementById('cartCountBadge').textContent = n;
  document.getElementById('cartTotalBar').textContent = fmt(cartTotal());
  document.getElementById('cartBar').classList.toggle('visible', n > 0);
}

function openCart() { renderCart(); document.getElementById('cartScreen').classList.add('active'); }
function closeCart() { document.getElementById('cartScreen').classList.remove('active'); }

function selectType(type) {
  orderType = type;
  document.getElementById('typeDelivery').classList.toggle('active', type === 'delivery');
  document.getElementById('typeTakeaway').classList.toggle('active', type === 'takeaway');
  document.getElementById('clientAddress').style.display = type === 'delivery' ? 'block' : 'none';
}

function renderCart() {
  const list = document.getElementById('cartItemsList');
  list.innerHTML = '';
  cartItems().forEach(item => {
    const div = document.createElement('div');
    div.className = 'cart-item';
    div.innerHTML = `
      <div class="cart-item-gem"><svg class="icon" viewBox="0 0 24 24"><path d="M18 8a4 4 0 0 1 0 8M6 4v16M6 4c0 2.5 2.5 2.5 2.5 5S6 11.5 6 14"/></svg></div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">${item.qty} × ${fmt(item.price)}</div>
      </div>
      <div class="qty-control">
        <button class="qty-btn" onclick="cartChangeQty(${item.id},-1)"><svg class="icon" viewBox="0 0 24 24"><path d="M5 12h14"/></svg></button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn" onclick="cartChangeQty(${item.id},1)"><svg class="icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
      </div>`;
    list.appendChild(div);
  });

  document.getElementById('summaryCount').textContent = cartCount() + ' ta taom';
  document.getElementById('summarySubtotal').textContent = fmt(cartTotal());
  document.getElementById('summaryTotal').textContent = fmt(cartTotal());

  if (orderType === 'dine_in') {
    document.getElementById('orderTypeSection').style.display = 'none';
    document.getElementById('clientAddress').style.display = 'none';
    document.getElementById('clientName').style.display = 'none';
    document.getElementById('clientPhone').style.display = 'none';
    document.getElementById('tableBanner').style.display = 'flex';
    document.getElementById('tableBannerTitle').textContent = 'Stol №' + tableNumber;
  } else {
    document.getElementById('orderTypeSection').style.display = 'block';
    document.getElementById('tableBanner').style.display = 'none';
    document.getElementById('clientName').style.display = 'block';
    document.getElementById('clientPhone').style.display = 'block';
    document.getElementById('clientAddress').style.display = orderType === 'delivery' ? 'block' : 'none';
  }
}

function cartChangeQty(id, delta) {
  changeQty(id, delta);
  if (cartCount() === 0) { closeCart(); return; }
  renderCart();
}

async function submitOrder() {
  const btn = document.getElementById('checkoutBtn');
  const name = document.getElementById('clientName').value.trim();
  const phone = document.getElementById('clientPhone').value.trim();
  const address = document.getElementById('clientAddress').value.trim();
  const comment = document.getElementById('clientComment').value.trim();

  if (orderType !== 'dine_in') {
    if (!name) { alert('Ismingizni kiriting'); return; }
    if (!phone || phone === '+998') { alert('Telefon raqamingizni kiriting'); return; }
  }
  if (orderType === 'delivery' && !address) { alert('Manzilni kiriting'); return; }

  // initData обязателен — без него сервер отклонит запрос с 401
  const tg = window.Telegram?.WebApp;
  const initData = tg?.initData;
  if (!initData) {
    alert('Telegram Mini App dan foydalaning');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Yuborilmoqda...';

  // restaurant_id и client_telegram_id убраны из payload —
  // сервер берёт их из заголовков X-Restaurant-Id и X-Telegram-Init-Data
  const payload = {
    client_name: name || null,
    client_phone: phone || null,
    order_type: orderType,
    address: orderType === 'delivery' ? address : null,
    table_id: orderType === 'dine_in' ? tableDbId : null,
    comment: comment || null,
    items: cartItems().map(i => ({ product_id: i.id, quantity: i.qty }))
  };

  try {
    const res = await fetch(`${API_BASE}/api/orders/`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        // Сервер верифицирует подпись Telegram HMAC-SHA256
        'X-Telegram-Init-Data': initData,
        // Сервер загружает ресторан и его бот-токен для верификации
        'X-Restaurant-Id': String(restaurant.id),
      },
      body: JSON.stringify(payload)
    });
    if (!res.ok) { const err = await res.json(); throw new Error(err.detail || 'Xato'); }
    const order = await res.json();
    showSuccess(order.id);
  } catch (e) {
    alert('Xato: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Buyurtma berish →';
  }
}

function showSuccess(orderId) {
  document.getElementById('successOrderId').textContent = '#' + String(orderId).padStart(4,'0');
  if (orderType === 'dine_in') {
    document.getElementById('successSubtitle').textContent = 'Buyurtmangiz qabul qilindi! Tez orada stolga yetkaziladi';
  } else if (orderType === 'takeaway') {
    document.getElementById('successSubtitle').textContent = "Tayyor bo'lganda xabar beramiz";
  } else {
    document.getElementById('successSubtitle').textContent = 'Tez orada yetkaziladi';
  }
  document.getElementById('cartScreen').classList.remove('active');
  document.getElementById('successScreen').classList.add('active');
  cart = {}; updateBar();
}

function backToMenu() {
  document.getElementById('successScreen').classList.remove('active');
  renderMenu();
}

window.addEventListener('DOMContentLoaded', () => {
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }
  parseParams();
  loadMenu();
});
</script>
</body>
</html>
