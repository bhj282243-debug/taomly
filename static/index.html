<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Taomly</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* =========================
   10/10 PREMIUM DESIGN SYSTEM
   Apple + Mercedes S-Class + Stripe feel
========================= */

:root{
  --bg:#F5F2EC;
  --card:rgba(255,255,255,0.72);
  --glass:rgba(255,255,255,0.55);

  --text:#1B1A18;
  --muted:#8A8178;

  --accent:#7A1530;
  --accent-dark:#5E0F25;
  --gold:#B68A3F;

  --radius:24px;

  --shadow-sm:0 8px 24px rgba(0,0,0,0.06);
  --shadow-md:0 18px 50px rgba(0,0,0,0.10);
  --shadow-lg:0 30px 90px rgba(0,0,0,0.18);

  --ease:cubic-bezier(0.22,1,0.36,1);
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}

/* ===== GLASS SYSTEM ===== */
.glass{
  background:var(--glass);
  backdrop-filter: blur(22px);
  -webkit-backdrop-filter: blur(22px);
  border:1px solid rgba(255,255,255,0.5);
}

/* ===== SPLASH ===== */
#splash{
  position:fixed;inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--bg);
  z-index:999;
  flex-direction:column;
}

/* ===== HEADER ===== */
.header{
  position:sticky;
  top:0;
  z-index:50;
  padding:16px;
}

.restaurant-row{
  display:flex;
  gap:12px;
  align-items:center;
}

.restaurant-logo{
  width:52px;height:52px;
  border-radius:18px;
  background:linear-gradient(145deg,var(--accent),var(--accent-dark));
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-weight:700;
  box-shadow:var(--shadow-sm);
}

.restaurant-name{
  font-family:"Playfair Display";
  font-size:20px;
  font-weight:700;
}

/* ===== HERO ===== */
.hero-banner{
  margin-top:14px;
  padding:20px;
  border-radius:var(--radius);
  background:linear-gradient(135deg,var(--accent),var(--accent-dark));
  color:white;
  box-shadow:var(--shadow-lg);
}

.hero-title{
  font-family:"Playfair Display";
  font-size:22px;
}

/* ===== CATEGORY ===== */
.categories-scroll{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:10px 0;
}

.cat-btn{
  padding:10px 16px;
  border-radius:999px;
  border:1px solid rgba(0,0,0,0.06);
  background:rgba(255,255,255,0.75);
  white-space:nowrap;
  transition:.25s var(--ease);
}

.cat-btn.active{
  background:var(--accent);
  color:white;
  box-shadow:var(--shadow-sm);
}

/* ===== PRODUCT CARD (ULTRA PREMIUM) ===== */
.product-card{
  display:flex;
  gap:14px;
  padding:14px;
  margin-bottom:12px;
  border-radius:20px;
  background:var(--card);
  backdrop-filter:blur(18px);
  box-shadow:var(--shadow-sm);
  transition:.25s var(--ease);
}

.product-card:active{
  transform:scale(0.98);
}

.product-img{
  width:90px;
  height:90px;
  border-radius:18px;
  background:#eee;
  overflow:hidden;
}

.product-name{
  font-weight:600;
  font-size:15px;
}

.product-price{
  font-family:"Playfair Display";
  color:var(--accent);
  font-size:16px;
  margin-top:4px;
}

/* ===== BUTTON ===== */
.add-btn{
  width:38px;
  height:38px;
  border-radius:50%;
  border:none;
  background:linear-gradient(145deg,var(--accent),var(--accent-dark));
  color:white;
  box-shadow:var(--shadow-sm);
}

/* ===== CART BAR ===== */
.cart-bar{
  position:fixed;
  bottom:18px;
  left:0;
  right:0;
  display:flex;
  justify-content:center;
}

.cart-btn{
  display:flex;
  gap:12px;
  align-items:center;
  padding:14px 18px;
  border-radius:999px;
  background:rgba(122,21,48,0.95);
  color:white;
  box-shadow:var(--shadow-lg);
}

/* ===== ANIMATION ===== */
.product-card{
  animation:fadeUp .35s var(--ease);
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

::-webkit-scrollbar{display:none}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <h1 style="font-family:Playfair Display;">Taomly</h1>
</div>

<!-- HEADER -->
<div class="header glass">
  <div class="restaurant-row">
    <div class="restaurant-logo" id="restaurantLogo">T</div>
    <div class="restaurant-name" id="restaurantName">Loading...</div>
  </div>

  <div class="hero-banner">
    <div class="hero-title">Mazali taomlar</div>
  </div>

  <div class="categories-scroll" id="categoriesNav"></div>
</div>

<!-- MENU -->
<div id="menuContent" style="padding:14px"></div>

<!-- CART -->
<div class="cart-bar">
  <button class="cart-btn">
    Savat
    <span id="cartTotalBar">0 so'm</span>
  </button>
</div>

<script>

/* =========================
   LOGIC (UNCHANGED)
========================= */

const API_BASE='';
let restaurant=null,cart={};

function fmt(p){return p.toLocaleString('uz-UZ')+" so'm"}

async function loadMenu(){
  const res=await fetch(`/api/restaurants/chinar`);
  restaurant=await res.json();

  document.getElementById('restaurantName').textContent=restaurant.name;
  document.getElementById('restaurantLogo').textContent=restaurant.name[0];

  renderCategories();
  renderMenu();

  setTimeout(()=>document.getElementById('splash').style.display='none',700);
}

function renderCategories(){
  const nav=document.getElementById('categoriesNav');
  nav.innerHTML='';
  restaurant.categories.forEach(c=>{
    const b=document.createElement('button');
    b.className='cat-btn';
    b.textContent=c.name;
    b.onclick=()=>document.getElementById('cat-'+c.id).scrollIntoView({behavior:'smooth'});
    nav.appendChild(b);
  });
}

function renderMenu(){
  const root=document.getElementById('menuContent');
  root.innerHTML='';

  restaurant.categories.forEach(cat=>{
    const wrap=document.createElement('div');
    wrap.id='cat-'+cat.id;

    cat.products.forEach(p=>{
      const div=document.createElement('div');
      div.className='product-card';

      div.innerHTML=`
        <div class="product-img"></div>
        <div style="flex:1">
          <div class="product-name">${p.name}</div>
          <div class="product-price">${fmt(p.price)}</div>
          <button class="add-btn" onclick="addItem(${p.id})">+</button>
        </div>
      `;

      wrap.appendChild(div);
    });

    root.appendChild(wrap);
  });
}

function addItem(id){
  cart[id]=(cart[id]||0)+1;
  updateCart();
}

function updateCart(){
  let total=0;
  for(let id in cart){
    const p=find(id);
    total+=p.price*cart[id];
  }
  document.getElementById('cartTotalBar').textContent=fmt(total);
}

function find(id){
  for(const c of restaurant.categories){
    const p=c.products.find(x=>x.id==id);
    if(p)return p;
  }
}

window.onload=loadMenu;

</script>

</body>
</html>
