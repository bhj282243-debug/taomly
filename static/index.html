<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Taomly</title>

<link rel="manifest" href="/static/manifest.json" id="pwaManifest">
<meta name="theme-color" content="#080807" id="pwaThemeColor">
<meta name="mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Taomly" id="pwaTitle">

<link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png">
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

<style>
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  /* ── Базовая палитра Taomly — постоянная ── */
  --obsidian:     #080807;
  --onyx:         #0E0E0C;
  --graphite:     #141412;
  --stone:        #1A1A17;
  --stone-light:  #222220;
  --pewter:       #2C2C29;

  /* ── Текст ── */
  --ivory:        #F2EFE6;
  --ivory-dim:    #B8B4A8;
  --ivory-ghost:  #6B6860;
  --ivory-trace:  rgba(242,239,230,0.06);

  /* ── Золото (акцент по умолчанию, переопределяется брендингом) ── */
  --gold:         #C4A96A;
  --gold-soft:    #A8904F;
  --gold-glow:    rgba(196,169,106,0.15);
  --gold-trace:   rgba(196,169,106,0.07);

  /* ── Поверхности ── */
  --glass-bg:     rgba(14,14,12,0.88);
  --glass-border: rgba(196,169,106,0.12);
  --card-border:  rgba(242,239,230,0.06);

  /* ── Типографика ── */
  --font-serif:   'Cormorant Garamond', 'EB Garamond', Georgia, serif;
  --font-sans:    'Inter', -apple-system, sans-serif;

  /* ── Геометрия ── */
  --r-pill: 100px;
  --r-lg:   18px;
  --r-md:   12px;
  --r-sm:    8px;

  /* ── Тени ── */
  --shadow-deep:  0 32px 80px rgba(0,0,0,0.7), 0 8px 24px rgba(0,0,0,0.4);
  --shadow-card:  0 2px 0 var(--card-border), 0 16px 48px rgba(0,0,0,0.5);
  --shadow-gold:  0 8px 40px rgba(196,169,106,0.18);

  /* ── Переходы ── */
  --ease-luxury:  cubic-bezier(0.25, 0.46, 0.45, 0.94);
  --ease-spring:  cubic-bezier(0.22, 1, 0.36, 1);
  --t-slow:       0.6s;
  --t-med:        0.4s;
  --t-fast:       0.22s;
}

html { background: var(--obsidian); }

body {
  font-family: var(--font-sans);
  background: var(--obsidian);
  color: var(--ivory);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

svg { display: block; }
.icon {
  width: 18px; height: 18px;
  stroke: currentColor; stroke-width: 1.3;
  fill: none; stroke-linecap: round; stroke-linejoin: round;
}

/* ═══════════════════════════════════════════════════
   SPLASH — кинематографическое открытие
═══════════════════════════════════════════════════ */
#splash {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--obsidian);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  overflow: hidden;
}
#splash.out {
  animation: splashOut 1s var(--ease-luxury) forwards;
}
@keyframes splashOut {
  0%   { opacity: 1; }
  100% { opacity: 0; pointer-events: none; }
}

/* Атмосферное свечение — как свет через штору */
.splash-ambient {
  position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 60% 40% at 50% 30%, rgba(196,169,106,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 80% 60% at 50% 80%, rgba(196,169,106,0.04) 0%, transparent 60%);
  animation: ambientBreath 4s ease-in-out infinite;
}
@keyframes ambientBreath {
  0%,100% { opacity: 0.6; }
  50%      { opacity: 1; }
}

/* Горизонтальный луч — подпись стиля */
.splash-ray {
  position: absolute; top: 50%; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg,
    transparent 0%,
    rgba(196,169,106,0.0) 20%,
    rgba(196,169,106,0.35) 50%,
    rgba(196,169,106,0.0) 80%,
    transparent 100%);
  transform: translateY(-68px);
  opacity: 0;
  animation: raySlide 1.8s var(--ease-luxury) 0.3s both;
}
@keyframes raySlide {
  0%   { opacity: 0; transform: translateY(-68px) scaleX(0); }
  40%  { opacity: 1; }
  100% { opacity: 1; transform: translateY(-68px) scaleX(1); }
}

.splash-content {
  text-align: center; position: relative;
  display: flex; flex-direction: column; align-items: center;
}

/* Монограмма — эмблема */
.splash-emblem {
  width: 64px; height: 64px;
  margin-bottom: 32px;
  opacity: 0;
  animation: emblemIn 1s var(--ease-spring) 0.1s both;
  position: relative;
}
.splash-emblem-ring {
  position: absolute; inset: 0; border-radius: 50%;
  border: 1px solid var(--glass-border);
  animation: emblemRingPulse 3s ease infinite 1.5s;
}
@keyframes emblemRingPulse {
  0%,100% { transform: scale(1); opacity: 1; }
  50%      { transform: scale(1.06); opacity: 0.5; }
}
.splash-emblem-inner {
  width: 100%; height: 100%; border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, var(--stone-light), var(--graphite));
  border: 1px solid rgba(196,169,106,0.2);
  display: flex; align-items: center; justify-content: center;
}
.splash-emblem-letter {
  font-family: var(--font-serif);
  font-size: 26px; font-weight: 300;
  color: var(--gold); letter-spacing: 2px;
  font-style: italic;
}
@keyframes emblemIn {
  from { opacity: 0; transform: scale(0.9); }
  to   { opacity: 1; transform: scale(1); }
}

.splash-name {
  font-family: var(--font-serif);
  font-size: 11px; font-weight: 400;
  letter-spacing: 7px;
  text-transform: uppercase;
  color: var(--ivory);
  opacity: 0;
  animation: nameReveal 1s var(--ease-luxury) 0.6s both;
}
@keyframes nameReveal {
  from { opacity: 0; letter-spacing: 12px; }
  to   { opacity: 1; letter-spacing: 7px; }
}

.splash-rule {
  width: 1px; height: 0;
  background: linear-gradient(180deg, var(--gold), transparent);
  margin: 20px auto 0;
  animation: ruleGrow 0.8s var(--ease-luxury) 1s both;
}
@keyframes ruleGrow {
  from { height: 0; opacity: 0; }
  to   { height: 32px; opacity: 0.6; }
}

.splash-tagline {
  font-size: 10px; letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--ivory-ghost);
  font-weight: 400;
  margin-top: 20px;
  opacity: 0;
  animation: fadeUp 0.6s var(--ease-luxury) 1.3s both;
}

/* ═══════════════════════════════════════════════════
   HEADER — интерьер дорогого отеля
═══════════════════════════════════════════════════ */
.header {
  position: sticky; top: 0; z-index: 100;
  background: var(--glass-bg);
  backdrop-filter: blur(32px) saturate(140%);
  -webkit-backdrop-filter: blur(32px) saturate(140%);
  border-bottom: 1px solid var(--glass-border);
}

.header-top {
  padding: 20px 24px 18px;
  display: flex; align-items: center; gap: 16px;
}

/* Эмблема ресторана */
.restaurant-emblem {
  width: 46px; height: 46px; border-radius: 50%;
  background: var(--stone);
  border: 1px solid var(--glass-border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; overflow: hidden;
  position: relative;
}
.restaurant-emblem::after {
  content: '';
  position: absolute; inset: 0; border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, rgba(196,169,106,0.08), transparent 70%);
}
.restaurant-emblem img { width: 100%; height: 100%; object-fit: cover; }
.restaurant-emblem-letter {
  font-family: var(--font-serif);
  font-size: 19px; font-weight: 300;
  color: var(--gold); font-style: italic;
}

.restaurant-info { flex: 1; min-width: 0; }

.restaurant-name {
  font-family: var(--font-serif);
  font-size: 24px; font-weight: 400;
  color: var(--ivory); letter-spacing: 0.5px;
  line-height: 1.1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.restaurant-address {
  display: flex; align-items: center; gap: 5px;
  margin-top: 3px;
  font-size: 11px; color: var(--ivory-ghost);
  font-weight: 400; letter-spacing: 0.3px;
}
.restaurant-address .icon { width: 10px; height: 10px; flex-shrink: 0; }

.table-badge {
  display: inline-flex; align-items: center; gap: 5px;
  margin-top: 6px; padding: 3px 10px 3px 8px;
  border-radius: var(--r-pill);
  background: var(--gold-trace);
  border: 1px solid var(--glass-border);
  font-size: 10.5px; font-weight: 500;
  color: var(--gold); letter-spacing: 0.5px;
}
.table-badge .icon { width: 10px; height: 10px; }

/* Золотая тонкая линия */
.header-gold-rule {
  height: 1px; margin: 0 24px;
  background: linear-gradient(90deg,
    transparent,
    var(--gold-soft) 30%,
    var(--gold) 50%,
    var(--gold-soft) 70%,
    transparent);
  opacity: 0.3;
}

/* Приветствие */
.welcome-line {
  padding: 12px 24px 0;
}
.welcome-text {
  font-family: var(--font-serif);
  font-style: italic; font-size: 14px; font-weight: 300;
  color: var(--ivory-ghost); line-height: 1.5;
  letter-spacing: 0.2px;
}

/* Популярное — горизонтальный скролл */
.popular-rail {
  padding: 16px 0 0;
}
.popular-eyebrow {
  padding: 0 24px;
  font-size: 9px; letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--ivory-ghost); font-weight: 500;
  margin-bottom: 12px;
}
.popular-scroll {
  display: flex; gap: 10px;
  overflow-x: auto; scrollbar-width: none;
  padding: 0 24px 14px;
}
.popular-scroll::-webkit-scrollbar { display: none; }

.popular-item {
  flex-shrink: 0; width: 110px;
  cursor: pointer;
  transition: transform var(--t-med) var(--ease-spring);
}
.popular-item:active { transform: scale(0.95); }
.popular-item-photo {
  width: 110px; height: 80px;
  border-radius: var(--r-md);
  overflow: hidden; position: relative;
  background: var(--stone);
  margin-bottom: 8px;
}
.popular-item-photo img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform var(--t-slow) var(--ease-luxury);
}
.popular-item:active .popular-item-photo img { transform: scale(1.04); }
.popular-item-photo-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
}
.popular-item-photo-placeholder .icon { width: 20px; height: 20px; stroke: var(--ivory-ghost); stroke-width: 1; }
.popular-item-name {
  font-size: 11.5px; font-weight: 500; color: var(--ivory-dim);
  line-height: 1.3;
  overflow: hidden; display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical;
}
.popular-item-price {
  font-family: var(--font-serif);
  font-size: 13px; font-weight: 400;
  color: var(--gold); margin-top: 3px;
}

/* Категории nav */
.categories-nav {
  display: flex; overflow-x: auto; scrollbar-width: none;
  padding: 0 24px;
  border-top: 1px solid var(--ivory-trace);
  gap: 2px;
}
.categories-nav::-webkit-scrollbar { display: none; }

.cat-btn {
  flex-shrink: 0; padding: 13px 16px;
  border: none; background: none;
  font-family: var(--font-sans);
  font-size: 12px; font-weight: 400;
  color: var(--ivory-ghost); cursor: pointer;
  white-space: nowrap; position: relative;
  letter-spacing: 0.3px;
  transition: color var(--t-fast) ease;
}
.cat-btn::after {
  content: ''; position: absolute;
  bottom: 0; left: 16px; right: 16px; height: 1px;
  background: var(--gold);
  transform: scaleX(0);
  transition: transform var(--t-med) var(--ease-spring);
  transform-origin: left;
}
.cat-btn.active { color: var(--ivory); }
.cat-btn.active::after { transform: scaleX(1); }

/* ═══════════════════════════════════════════════════
   MAIN
═══════════════════════════════════════════════════ */
.main { padding: 32px 0 180px; }

.category-section { margin-bottom: 56px; scroll-margin-top: 180px; }

.category-heading {
  padding: 0 24px;
  margin-bottom: 20px;
  display: flex; align-items: baseline; gap: 10px;
}
.category-title {
  font-family: var(--font-serif);
  font-size: 28px; font-weight: 300;
  color: var(--ivory); letter-spacing: 0.3px;
  line-height: 1;
}
.category-count {
  font-size: 11px; color: var(--ivory-ghost);
  font-weight: 400; letter-spacing: 0.5px;
}

.products-grid {
  display: flex; flex-direction: column;
  gap: 1px; /* Блюда разделены тонкой линией воздуха */
}

/* ═══════════════════════════════════════════════════
   PRODUCT CARD — кинематографичная
═══════════════════════════════════════════════════ */
.product-card {
  position: relative; overflow: hidden;
  cursor: pointer;
  opacity: 0;
  animation: cardReveal var(--t-slow) var(--ease-spring) forwards;
  transition: background var(--t-fast) ease;
}
@keyframes cardReveal {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* С фото — фото занимает всю карточку */
.product-card.has-photo {
  margin: 0 0 16px;
  border-radius: var(--r-lg);
  overflow: hidden;
  box-shadow: var(--shadow-card);
}
.product-card.has-photo:last-child { margin-bottom: 0; }

.product-photo-wrap {
  position: relative;
  width: 100%; padding-top: 65%;
  overflow: hidden;
  background: var(--stone);
}
.product-photo-wrap img {
  position: absolute; inset: 0;
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.8s var(--ease-luxury);
  will-change: transform;
}
.product-card:active .product-photo-wrap img { transform: scale(1.04); }

/* Градиент снизу для читаемости текста поверх фото */
.product-photo-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(
    to bottom,
    transparent 30%,
    rgba(8,8,7,0.4) 60%,
    rgba(8,8,7,0.85) 100%
  );
}

/* Бейдж поверх фото */
.product-photo-badge {
  position: absolute; top: 14px; left: 14px;
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px;
  background: rgba(8,8,7,0.6);
  backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: var(--r-pill);
  font-size: 9px; font-weight: 500;
  color: var(--gold); letter-spacing: 1.5px;
  text-transform: uppercase;
}

/* Контент поверх фото — снизу */
.product-photo-content {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 18px 18px 16px;
  display: flex; align-items: flex-end; justify-content: space-between; gap: 12px;
}
.product-photo-text { flex: 1; min-width: 0; }
.product-name {
  font-family: var(--font-serif);
  font-size: 20px; font-weight: 400;
  color: var(--ivory); line-height: 1.2;
  letter-spacing: 0.2px;
}
.product-desc-photo {
  font-size: 12px; color: rgba(242,239,230,0.6);
  margin-top: 4px; line-height: 1.5;
  overflow: hidden; display: -webkit-box;
  -webkit-line-clamp: 1; -webkit-box-orient: vertical;
}
.product-price-photo {
  font-family: var(--font-serif);
  font-size: 16px; font-weight: 400;
  color: var(--gold); margin-top: 6px;
  white-space: nowrap;
}

/* Без фото — элегантная строка */
.product-card.no-photo {
  padding: 20px 24px;
  border-bottom: 1px solid var(--ivory-trace);
  background: transparent;
}
.product-card.no-photo:active { background: rgba(242,239,230,0.02); }

.product-row {
  display: flex; align-items: center; gap: 16px;
}
.product-row-text { flex: 1; min-width: 0; }
.product-name-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 3px;
}
.product-name-plain {
  font-family: var(--font-serif);
  font-size: 18px; font-weight: 400;
  color: var(--ivory); letter-spacing: 0.2px;
}
.product-desc-plain {
  font-size: 12.5px; color: var(--ivory-ghost); line-height: 1.5;
  margin-top: 2px;
  overflow: hidden; display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical;
}
.product-price-plain {
  font-family: var(--font-serif);
  font-size: 15px; color: var(--gold);
  margin-top: 8px; font-weight: 400;
}
.product-badge-inline {
  display: inline-flex;
  padding: 1px 7px;
  border-radius: var(--r-pill);
  background: var(--gold-trace);
  border: 1px solid var(--glass-border);
  font-size: 8.5px; font-weight: 500;
  color: var(--gold); letter-spacing: 1.2px;
  text-transform: uppercase; flex-shrink: 0;
}

/* ── Кнопка добавления — премиальный ритуал ── */
.add-ring {
  flex-shrink: 0;
  width: 38px; height: 38px; border-radius: 50%;
  background: transparent;
  border: 1px solid rgba(196,169,106,0.3);
  color: var(--gold);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
  transition:
    border-color var(--t-med) ease,
    background var(--t-med) ease,
    transform var(--t-fast) ease;
}
.add-ring::before {
  content: '';
  position: absolute; inset: 0; border-radius: 50%;
  background: radial-gradient(circle, var(--gold-glow), transparent);
  opacity: 0;
  transition: opacity var(--t-med) ease;
}
.add-ring:active {
  transform: scale(0.88);
  border-color: var(--gold);
  background: var(--gold-trace);
}
.add-ring:active::before { opacity: 1; }
.add-ring .icon { width: 14px; height: 14px; stroke-width: 1.5; z-index: 1; }

/* Счётчик */
.qty-unit {
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.qty-ring {
  width: 28px; height: 28px; border-radius: 50%;
  background: transparent;
  border: 1px solid var(--ivory-trace);
  color: var(--ivory-dim);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: opacity var(--t-fast) ease, border-color var(--t-fast) ease;
}
.qty-ring:active { opacity: 0.4; }
.qty-ring .icon { width: 11px; height: 11px; }
.qty-digit {
  font-family: var(--font-serif);
  font-size: 17px; font-weight: 400;
  color: var(--ivory); min-width: 18px; text-align: center;
  animation: digitPop 0.25s var(--ease-spring);
}
@keyframes digitPop {
  from { transform: scale(1.3); opacity: 0.7; }
  to   { transform: scale(1); opacity: 1; }
}

/* Контрол на карточке с фото — кнопка поверх */
.photo-add-wrap {
  flex-shrink: 0;
}

/* ═══════════════════════════════════════════════════
   SKELETON
═══════════════════════════════════════════════════ */
.skeleton-wrap {
  padding: 0 0 0;
  display: flex; flex-direction: column; gap: 16px;
}
.skeleton-card {
  border-radius: var(--r-lg);
  overflow: hidden;
  background: var(--stone);
}
.skeleton-photo-block {
  width: 100%; padding-top: 65%;
  position: relative;
}
.skeleton-shimmer {
  position: absolute; inset: 0;
  background: linear-gradient(
    105deg,
    var(--stone) 0%,
    var(--stone-light) 40%,
    var(--stone) 60%
  );
  background-size: 300% 100%;
  animation: shimmer 2s ease infinite;
}
@keyframes shimmer {
  0%   { background-position: 100% 0; }
  100% { background-position: -100% 0; }
}
.skeleton-body-block {
  padding: 16px 18px 18px;
  display: flex; flex-direction: column; gap: 9px;
  background: var(--graphite);
}
.skeleton-line {
  height: 11px; border-radius: 6px;
}
.skeleton-line.w35 { width: 35%; }
.skeleton-line.w65 { width: 65%; }
.skeleton-line.w45 { width: 45%; height: 14px; }

/* ═══════════════════════════════════════════════════
   CART BAR — стеклянная капсула
═══════════════════════════════════════════════════ */
.cart-bar {
  position: fixed; bottom: 32px; left: 20px; right: 20px;
  z-index: 200; pointer-events: none;
  transform: translateY(140%);
  transition: transform 0.5s var(--ease-spring);
}
.cart-bar.visible { transform: translateY(0); pointer-events: all; }

.cart-capsule {
  width: 100%;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 6px 0 20px;
  height: 60px;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: var(--r-pill);
  backdrop-filter: blur(32px) saturate(160%);
  -webkit-backdrop-filter: blur(32px) saturate(160%);
  box-shadow:
    var(--shadow-gold),
    0 1px 0 rgba(196,169,106,0.08) inset,
    0 -1px 0 rgba(0,0,0,0.3) inset;
  cursor: pointer;
  transition: transform var(--t-fast) ease, box-shadow var(--t-fast) ease;
  position: relative; overflow: hidden;
}
/* Блик */
.cart-capsule::before {
  content: '';
  position: absolute; top: 0; left: 20%; right: 20%; height: 1px;
  background: linear-gradient(90deg,
    transparent, rgba(196,169,106,0.3), transparent);
}
.cart-capsule:active {
  transform: scale(0.98);
  box-shadow: var(--shadow-gold), 0 4px 16px rgba(0,0,0,0.4);
}

.cart-capsule-left {
  display: flex; align-items: center; gap: 12px;
}
.cart-count-gem {
  width: 34px; height: 34px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold-soft), var(--gold));
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(196,169,106,0.3);
}
.cart-count-gem span {
  font-family: var(--font-serif);
  font-size: 15px; font-weight: 400;
  color: var(--obsidian); line-height: 1;
}
.cart-label-text {
  font-size: 13px; font-weight: 400; color: var(--ivory-dim);
  letter-spacing: 0.5px;
}
.cart-total-text {
  font-family: var(--font-serif);
  font-size: 18px; font-weight: 400;
  color: var(--ivory); letter-spacing: 0.2px;
  padding-right: 4px;
}
.cart-arrow {
  width: 48px; height: 48px; border-radius: 50%;
  background: var(--gold);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(196,169,106,0.25);
  flex-shrink: 0;
}
.cart-arrow .icon {
  width: 16px; height: 16px;
  stroke: var(--obsidian); stroke-width: 1.8;
  transform: rotate(-90deg);
}

/* ═══════════════════════════════════════════════════
   SCREENS
═══════════════════════════════════════════════════ */
.screen {
  display: none; position: fixed; inset: 0;
  background: var(--obsidian); z-index: 300;
  overflow-y: auto; overflow-x: hidden;
  animation: screenReveal 0.45s var(--ease-spring);
}
.screen.active { display: block; }
@keyframes screenReveal {
  from { transform: translateY(32px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}

.screen-header {
  position: sticky; top: 0; z-index: 10;
  background: var(--glass-bg);
  backdrop-filter: blur(32px);
  -webkit-backdrop-filter: blur(32px);
  border-bottom: 1px solid var(--glass-border);
  padding: 16px 20px;
  display: flex; align-items: center; gap: 16px;
}
.back-btn {
  width: 40px; height: 40px; border-radius: 50%;
  border: 1px solid var(--ivory-trace);
  background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--ivory-dim); flex-shrink: 0;
  transition: background var(--t-fast) ease, transform var(--t-fast) ease;
}
.back-btn:active { background: var(--stone); transform: scale(0.9); }
.back-btn .icon { width: 16px; height: 16px; }
.screen-title {
  font-family: var(--font-serif);
  font-size: 22px; font-weight: 300; color: var(--ivory);
  letter-spacing: 0.3px;
}

/* ═══════════════════════════════════════════════════
   CART SCREEN
═══════════════════════════════════════════════════ */
.cart-items-list {
  padding: 20px 20px 0;
  display: flex; flex-direction: column; gap: 8px;
}

.cart-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px;
  background: var(--graphite);
  border: 1px solid var(--card-border);
  border-radius: var(--r-lg);
  animation: cardReveal 0.3s var(--ease-spring);
}
.cart-item-gem {
  width: 44px; height: 44px; border-radius: var(--r-md);
  background: var(--stone);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  border: 1px solid var(--glass-border);
}
.cart-item-gem .icon { width: 17px; height: 17px; stroke: var(--gold); stroke-width: 1.1; }
.cart-item-info { flex: 1; min-width: 0; }
.cart-item-name {
  font-family: var(--font-serif);
  font-size: 16px; font-weight: 400; color: var(--ivory);
}
.cart-item-price {
  font-size: 12px; color: var(--ivory-ghost); margin-top: 2px;
}

/* Order type */
.section-block { padding: 20px 20px 0; }
.section-eyebrow {
  font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--ivory-ghost); font-weight: 500;
  margin-bottom: 12px;
}
.type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.type-btn {
  padding: 16px; border-radius: var(--r-lg);
  border: 1px solid var(--ivory-trace);
  background: var(--graphite); text-align: center; cursor: pointer;
  transition: all var(--t-med) ease;
}
.type-btn.active {
  border-color: rgba(196,169,106,0.3);
  background: var(--gold-trace);
}
.type-btn-icon { margin: 0 auto 8px; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; }
.type-btn-icon .icon { width: 20px; height: 20px; stroke: var(--gold); stroke-width: 1.2; }
.type-btn-label { font-size: 12.5px; font-weight: 500; color: var(--ivory-dim); }

.table-banner {
  margin: 16px 20px 0;
  padding: 16px;
  background: var(--gold-trace);
  border: 1px solid var(--glass-border);
  border-radius: var(--r-lg);
  display: flex; align-items: center; gap: 14px;
}
.table-banner-icon {
  width: 40px; height: 40px; border-radius: var(--r-md);
  background: var(--stone);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.table-banner-icon .icon { width: 18px; height: 18px; stroke: var(--gold); stroke-width: 1.2; }
.table-banner-name {
  font-family: var(--font-serif);
  font-size: 16px; font-weight: 400; color: var(--ivory);
}
.table-banner-sub { font-size: 12px; color: var(--ivory-ghost); margin-top: 2px; }

/* Form */
.form-section { padding: 20px 20px 0; display: flex; flex-direction: column; gap: 10px; }
.form-input {
  width: 100%; padding: 15px 18px;
  border-radius: var(--r-lg);
  border: 1px solid var(--ivory-trace);
  background: var(--graphite);
  font-size: 15px; color: var(--ivory);
  outline: none; font-family: var(--font-sans);
  transition: border-color var(--t-fast) ease, box-shadow var(--t-fast) ease;
  letter-spacing: 0.2px;
}
.form-input:focus {
  border-color: rgba(196,169,106,0.4);
  box-shadow: 0 0 0 3px var(--gold-trace);
}
.form-input::placeholder { color: var(--ivory-ghost); }
.form-textarea { resize: none; height: 80px; }

/* Summary */
.summary-card {
  margin: 20px 20px 0;
  background: var(--graphite);
  border: 1px solid var(--card-border);
  border-radius: var(--r-lg); padding: 18px 20px;
}
.summary-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 0; font-size: 13.5px; color: var(--ivory-ghost);
}
.summary-rule { height: 1px; background: var(--ivory-trace); margin: 10px 0; }
.summary-row.total { font-size: 14px; color: var(--ivory); font-weight: 500; }
.summary-total-val {
  font-family: var(--font-serif);
  font-size: 24px; font-weight: 300;
  color: var(--gold);
}

.checkout-btn {
  margin: 20px 20px 52px; width: calc(100% - 40px);
  padding: 18px;
  background: linear-gradient(135deg, var(--gold-soft), var(--gold));
  border: none; border-radius: var(--r-pill);
  color: var(--obsidian);
  font-family: var(--font-sans);
  font-size: 14px; font-weight: 600; cursor: pointer;
  letter-spacing: 0.8px; text-transform: uppercase;
  box-shadow: var(--shadow-gold);
  transition: transform var(--t-fast) ease, box-shadow var(--t-fast) ease;
}
.checkout-btn:active { transform: scale(0.98); box-shadow: none; }
.checkout-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ═══════════════════════════════════════════════════
   PRODUCT MODAL — fullscreen кинематографичный
═══════════════════════════════════════════════════ */
.product-modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 400;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  animation: overlayIn 0.3s ease;
}
.product-modal-overlay.active { display: flex; align-items: flex-end; }
@keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }

.product-modal {
  width: 100%; max-height: 92vh; overflow-y: auto;
  background: var(--onyx);
  border-radius: 28px 28px 0 0;
  border-top: 1px solid var(--glass-border);
  position: relative;
  animation: modalUp 0.5s var(--ease-spring);
}
@keyframes modalUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}

.modal-grip {
  width: 36px; height: 3px; border-radius: 2px;
  background: var(--pewter);
  margin: 14px auto 0;
}

/* Фото почти fullscreen */
.modal-photo {
  width: 100%; margin-top: 14px;
  position: relative;
  overflow: hidden; background: var(--stone);
}
.modal-photo.tall { padding-top: 75%; }
.modal-photo.no-photo { padding-top: 0; margin: 0; }
.modal-photo img {
  position: absolute; inset: 0;
  width: 100%; height: 100%; object-fit: cover;
  animation: modalPhotoIn 0.7s var(--ease-luxury);
}
@keyframes modalPhotoIn {
  from { transform: scale(1.05); opacity: 0.7; }
  to   { transform: scale(1); opacity: 1; }
}
.modal-photo-gradient {
  position: absolute; bottom: 0; left: 0; right: 0; height: 40%;
  background: linear-gradient(transparent, var(--onyx));
}

.modal-close {
  position: absolute; top: 14px; right: 14px; z-index: 5;
  width: 38px; height: 38px; border-radius: 50%;
  background: rgba(8,8,7,0.7);
  backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--ivory-dim);
  transition: background var(--t-fast) ease;
}
.modal-close:active { background: var(--stone); }
.modal-close .icon { width: 15px; height: 15px; }

.modal-body {
  padding: 24px 24px 36px;
  animation: modalBodyIn 0.5s var(--ease-luxury) 0.1s both;
}
@keyframes modalBodyIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.modal-badge { margin-bottom: 12px; }
.modal-badge span {
  display: inline-flex;
  padding: 2px 10px;
  border-radius: var(--r-pill);
  background: var(--gold-trace);
  border: 1px solid var(--glass-border);
  font-size: 9px; font-weight: 500;
  color: var(--gold); letter-spacing: 2px;
  text-transform: uppercase;
}

.modal-name {
  font-family: var(--font-serif);
  font-size: 30px; font-weight: 300;
  color: var(--ivory); line-height: 1.15;
  margin-bottom: 12px; letter-spacing: 0.2px;
}
.modal-desc {
  font-size: 14px; color: var(--ivory-ghost);
  line-height: 1.7; margin-bottom: 28px;
  font-weight: 300;
}
.modal-footer {
  display: flex; align-items: center;
  justify-content: space-between; gap: 16px;
  padding-top: 22px;
  border-top: 1px solid var(--ivory-trace);
}
.modal-price-block {}
.modal-price-val {
  font-family: var(--font-serif);
  font-size: 28px; font-weight: 300;
  color: var(--ivory); letter-spacing: -0.5px;
}
.modal-price-currency {
  font-size: 11px; color: var(--ivory-ghost);
  font-weight: 400; letter-spacing: 1px;
  text-transform: uppercase; margin-top: 2px;
}
.modal-add-btn {
  padding: 15px 28px;
  background: linear-gradient(135deg, var(--gold-soft), var(--gold));
  border: none; border-radius: var(--r-pill); cursor: pointer;
  color: var(--obsidian);
  font-family: var(--font-sans);
  font-size: 13px; font-weight: 600;
  letter-spacing: 0.5px;
  box-shadow: var(--shadow-gold);
  transition: transform var(--t-fast) ease;
  display: flex; align-items: center; gap: 8px;
  flex-shrink: 0;
}
.modal-add-btn:active { transform: scale(0.95); }
.modal-add-btn .icon { width: 14px; height: 14px; stroke-width: 2; }
.modal-qty-unit { display: flex; align-items: center; gap: 14px; }
.modal-qty-unit .qty-ring { width: 38px; height: 38px; }
.modal-qty-unit .qty-digit { font-size: 20px; min-width: 24px; }

/* ═══════════════════════════════════════════════════
   SUCCESS
═══════════════════════════════════════════════════ */
#successScreen.active {
  display: flex !important; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; padding: 48px 32px;
  text-align: center;
}

.success-emblem {
  width: 96px; height: 96px; border-radius: 50%;
  background: var(--stone);
  border: 1px solid var(--glass-border);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 36px; position: relative;
  animation: emblemIn 0.7s var(--ease-spring);
}
.success-emblem::before {
  content: ''; position: absolute; inset: -14px; border-radius: 50%;
  border: 1px solid var(--glass-border);
  animation: ringPulse 3s ease infinite 1s;
}
.success-emblem::after {
  content: ''; position: absolute; inset: -28px; border-radius: 50%;
  border: 1px solid rgba(196,169,106,0.06);
  animation: ringPulse 3s ease infinite 1.4s;
}
@keyframes ringPulse {
  0%,100% { transform: scale(1); opacity: 1; }
  50%      { transform: scale(1.06); opacity: 0; }
}
.success-emblem .icon {
  width: 36px; height: 36px; stroke: var(--gold); stroke-width: 1.2;
  stroke-dasharray: 60; stroke-dashoffset: 60;
  animation: checkDraw 0.8s var(--ease-luxury) 0.4s forwards;
}
@keyframes checkDraw { to { stroke-dashoffset: 0; } }

.success-title {
  font-family: var(--font-serif);
  font-size: 30px; font-weight: 300; color: var(--ivory);
  letter-spacing: 0.3px; margin-bottom: 10px;
  opacity: 0; animation: fadeUp 0.5s ease 0.4s both;
}
.success-subtitle {
  font-size: 14px; color: var(--ivory-ghost); line-height: 1.65;
  margin-bottom: 36px; font-weight: 300;
  opacity: 0; animation: fadeUp 0.5s ease 0.5s both;
}
.success-id {
  background: var(--graphite);
  border: 1px solid var(--card-border);
  border-radius: var(--r-lg); padding: 20px 44px;
  margin-bottom: 40px;
  opacity: 0; animation: fadeUp 0.5s ease 0.6s both;
}
.success-id-label {
  font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--ivory-ghost); font-weight: 500;
}
.success-id-val {
  font-family: var(--font-serif);
  font-size: 38px; font-weight: 300;
  color: var(--gold); letter-spacing: -1px; margin-top: 6px;
}
.back-menu-btn {
  padding: 17px 48px;
  background: linear-gradient(135deg, var(--gold-soft), var(--gold));
  border: none; border-radius: var(--r-pill); cursor: pointer;
  color: var(--obsidian);
  font-family: var(--font-sans);
  font-size: 13px; font-weight: 600;
  letter-spacing: 0.8px; text-transform: uppercase;
  box-shadow: var(--shadow-gold);
  opacity: 0; animation: fadeUp 0.5s ease 0.7s both;
  transition: transform var(--t-fast) ease;
}
.back-menu-btn:active { transform: scale(0.97); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════ */
.error-state {
  text-align: center; padding: 80px 28px;
  color: var(--ivory-ghost); font-size: 13.5px; line-height: 1.8;
}
.error-icon {
  width: 40px; height: 40px; margin: 0 auto 20px;
  stroke: var(--ivory-ghost); stroke-width: 1; fill: none;
  opacity: 0.3;
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>

<script>
const API_BASE = '';
const DEFAULT_SLUG = 'chinar';

let restaurant = null;
let cart = {};
let orderType = 'delivery';
let tableNumber = null;
let tableDbId = null;
let restaurantSlug = DEFAULT_SLUG;

function parseParams() {
  const urlParams = new URLSearchParams(window.location.search);
  const slugParam = urlParams.get('slug');
  const tableParam = urlParams.get('table');
  if (slugParam) {
    restaurantSlug = slugParam;
    if (tableParam) { tableNumber = tableParam; orderType = 'dine_in'; }
    return;
  }
  const tg = window.Telegram?.WebApp;
  const startParam = tg?.initDataUnsafe?.start_param || '';
  if (startParam) {
    const parts = startParam.split('_');
    if (parts.length >= 2 && !isNaN(parts[parts.length - 1])) {
      tableNumber = parts[parts.length - 1];
      restaurantSlug = parts.slice(0, -1).join('_');
      orderType = 'dine_in';
    } else { restaurantSlug = startParam; }
  }
}

function fmt(p) { return p.toLocaleString('uz-UZ') + ' so\'m'; }
function fmtNum(p) { return p.toLocaleString('uz-UZ'); }

/* ══ applyBrandTheme — только акцент, основа неизменна ══ */
function applyBrandTheme(r) {
  const root = document.documentElement;

  let accentHex = r.primary_color || r.accent_color || null;

  if (accentHex) {
    const safe = _ensureContrast(accentHex, '#080807', 3.0);
    root.style.setProperty('--gold',       safe);
    root.style.setProperty('--gold-soft',  _darken(safe, 18));
    root.style.setProperty('--gold-glow',  _hexToRgba(safe, 0.15));
    root.style.setProperty('--gold-trace', _hexToRgba(safe, 0.07));
    root.style.setProperty('--glass-border', _hexToRgba(safe, 0.12));
  }

  if (r.name) {
    const pt = document.getElementById('pwaTitle');
    if (pt) pt.setAttribute('content', r.name);
    document.title = r.name;
    const sn = document.getElementById('splashName');
    if (sn) sn.textContent = r.name.toUpperCase();
    const sl = document.getElementById('splashLetter');
    if (sl) sl.textContent = r.name[0].toUpperCase();
  }
  document.getElementById('pwaThemeColor').setAttribute('content', '#080807');
  if (restaurantSlug) {
    const ml = document.getElementById('pwaManifest');
    if (ml) ml.setAttribute('href', `/manifest/${restaurantSlug}.json`);
  }
}

function _hexToRgba(hex, a) {
  if (!hex||hex.length<7) return `rgba(196,169,106,${a})`;
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function _relativeLuminance(hex) {
  if (!hex||hex.length<7) return 0;
  return [hex.slice(1,3),hex.slice(3,5),hex.slice(5,7)]
    .map(h=>{const v=parseInt(h,16)/255;return v<=0.03928?v/12.92:Math.pow((v+0.055)/1.055,2.4);})
    .reduce((s,v,i)=>s+[0.2126,0.7152,0.0722][i]*v, 0);
}
function _contrast(h1,h2){const l1=_relativeLuminance(h1),l2=_relativeLuminance(h2);return(Math.max(l1,l2)+0.05)/(Math.min(l1,l2)+0.05);}
function _ensureContrast(hex, bg, min) {
  let h=hex, n=0;
  while(_contrast(h,bg)<min && n<24){h=_lighten(h,10);n++;}
  return h;
}
function _lighten(hex,a){
  if(!hex||hex.length<7)return hex;
  return '#'+[parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)]
    .map(v=>Math.min(255,v+a).toString(16).padStart(2,'0')).join('');
}
function _darken(hex,a){
  if(!hex||hex.length<7)return hex;
  return '#'+[parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)]
    .map(v=>Math.max(0,v-a).toString(16).padStart(2,'0')).join('');
}

async function loadMenu() {
  try {
    const res = await fetch(`${API_BASE}/api/restaurants/${restaurantSlug}`);
    if (!res.ok) throw new Error('Server xatosi');
    restaurant = await res.json();
    applyBrandTheme(restaurant);

    document.getElementById('restaurantName').textContent = restaurant.name;

    const logoWrap = document.getElementById('restaurantLogo');
    if (restaurant.logo_url) {
      logoWrap.innerHTML = `<img src="${restaurant.logo_url}" alt="${restaurant.name}">`;
    } else {
      const L = (restaurant.name||'T')[0].toUpperCase();
      logoWrap.innerHTML = `<div class="restaurant-emblem-letter">${L}</div>`;
    }

    if (restaurant.address) {
      document.getElementById('restaurantAddressText').textContent = restaurant.address;
      document.getElementById('restaurantAddress').style.display = 'flex';
    }

    if (restaurant.welcome_text) {
      document.getElementById('welcomeText').textContent = restaurant.welcome_text;
      document.getElementById('welcomeLine').style.display = 'block';
    }

    if (tableNumber) {
      document.getElementById('tableBadgeText').textContent = 'Stol №' + tableNumber;
      document.getElementById('tableBadge').style.display = 'inline-flex';
      await resolveTableId();
    }

    renderPopular();
    renderCategories();
    renderMenu();

    setTimeout(() => {
      document.getElementById('splash').classList.add('out');
      setTimeout(() => {
        const s = document.getElementById('splash');
        if (s) s.style.display = 'none';
      }, 1000);
    }, 1800);

  } catch(e) {
    document.body.innerHTML =
      `<pre style="color:red;padding:20px;white-space:pre-wrap;font-size:13px">${e.message}\n\n${e.stack}</pre>`;
  }
}

function renderPopular() {
  const section = document.getElementById('popularSection');
  const scroll = document.getElementById('popularScroll');
  const items = [];
  (restaurant.categories||[]).forEach(cat => {
    (cat.products||[]).forEach(p => { if (p.is_popular) items.push(p); });
  });
  if (!items.length) { section.style.display='none'; return; }
  section.style.display = 'block';
  scroll.innerHTML = '';
  items.forEach(p => {
    const el = document.createElement('div');
    el.className = 'popular-item';
    el.onclick = () => openProductModal(p.id);
    const imgHtml = p.photo_url
      ? `<img src="${p.photo_url}" alt="${p.name}" loading="lazy">`
      : `<div class="popular-item-photo-placeholder"><svg class="icon" viewBox="0 0 24 24"><path d="M18 8a4 4 0 0 1 0 8M6 4v16M6 4c0 2.5 2.5 2.5 2.5 5S6 11.5 6 14"/></svg></div>`;
    el.innerHTML = `
      <div class="popular-item-photo">${imgHtml}</div>
      <div class="popular-item-name">${p.name}</div>
      <div class="popular-item-price">${fmt(p.price)}</div>`;
    scroll.appendChild(el);
  });
}

async function resolveTableId() {
  try {
    const res = await fetch(`${API_BASE}/api/restaurants/${restaurantSlug}/table/${tableNumber}`);
    if (res.ok) { const d = await res.json(); tableDbId = d.table_id; }
  } catch(e) { tableDbId = null; }
}

function renderCategories() {
  const nav = document.getElementById('categoriesNav');
  nav.innerHTML = '';
  (restaurant.categories||[]).forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (i===0?' active':'');
    btn.textContent = cat.name;
    btn.onclick = () => {
      document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const el = document.getElementById('cat-'+cat.id);
      if (el) el.scrollIntoView({behavior:'smooth',block:'start'});
    };
    nav.appendChild(btn);
  });
}

let _animIdx = 0;

function renderMenu() {
  const content = document.getElementById('menuContent');
  content.innerHTML = '';
  _animIdx = 0;
  (restaurant.categories||[]).forEach(cat => {
    if (!cat.products||!cat.products.length) return;
    const sec = document.createElement('div');
    sec.className = 'category-section';
    sec.id = 'cat-'+cat.id;
    sec.innerHTML = `
      <div class="category-heading">
        <div class="category-title">${cat.name}</div>
        <div class="category-count">${cat.products.length} ta</div>
      </div>
      <div class="products-grid" id="grid-${cat.id}"></div>`;
    content.appendChild(sec);
    const grid = sec.querySelector('#grid-'+cat.id);

    // Карточки с фото оборачиваем в padding-контейнер
    let photoGroup = null;
    cat.products.forEach(p => {
      if (p.photo_url) {
        if (!photoGroup) {
          photoGroup = document.createElement('div');
          photoGroup.style.cssText = 'padding:0 20px;display:flex;flex-direction:column;gap:16px;';
          grid.appendChild(photoGroup);
        }
        photoGroup.appendChild(makeCard(p));
      } else {
        photoGroup = null;
        grid.appendChild(makeCard(p));
      }
    });
  });
}

const BADGE_MAP = {
  bestseller: 'Bestseller',
  chef:       "Chef's Choice",
  new:        'New Arrival',
  spicy:      '🌶 Spicy',
};

function extractBadge(desc) {
  if (!desc) return {badge:null,text:''};
  const m = desc.match(/#(bestseller|chef|new|spicy)\b/i);
  if (!m) return {badge:null,text:desc};
  return {badge:BADGE_MAP[m[1].toLowerCase()], text:desc.replace(m[0],'').trim()};
}

function makeCard(p) {
  const div = document.createElement('div');
  const hasPhoto = !!p.photo_url;
  div.id = 'card-'+p.id;
  div.style.animationDelay = (_animIdx++%12)*0.06+'s';

  const qty = cart[p.id]?.qty||0;
  const {badge, text:descText} = extractBadge(p.description);
  const badgeHtml = badge ? `<div class="product-photo-badge">${badge}</div>` : '';
  const badgeInline = badge ? `<span class="product-badge-inline">${badge}</span>` : '';

  if (hasPhoto) {
    div.className = 'product-card has-photo';
    div.onclick = ()=>openProductModal(p.id);
    div.innerHTML = `
      <div class="product-photo-wrap">
        <img src="${p.photo_url}" alt="${p.name}" loading="lazy">
        <div class="product-photo-overlay"></div>
        ${badgeHtml}
        <div class="product-photo-content">
          <div class="product-photo-text">
            <div class="product-name">${p.name}</div>
            ${descText?`<div class="product-desc-photo">${descText}</div>`:''}
            <div class="product-price-photo">${fmt(p.price)}</div>
          </div>
          <div class="photo-add-wrap" id="ctrl-${p.id}" onclick="event.stopPropagation()">
            ${ctrlHtml(p,qty,true)}
          </div>
        </div>
      </div>`;
  } else {
    div.className = 'product-card no-photo';
    div.onclick = ()=>openProductModal(p.id);
    div.innerHTML = `
      <div class="product-row">
        <div class="product-row-text">
          <div class="product-name-row">
            <div class="product-name-plain">${p.name}</div>
            ${badgeInline}
          </div>
          ${descText?`<div class="product-desc-plain">${descText}</div>`:''}
          <div class="product-price-plain">${fmt(p.price)}</div>
        </div>
        <div id="ctrl-${p.id}" onclick="event.stopPropagation()">
          ${ctrlHtml(p,qty,false)}
        </div>
      </div>`;
  }
  return div;
}

function ctrlHtml(p, qty, onPhoto) {
  if (qty===0) return `<button class="add-ring" onclick="event.stopPropagation();addItem(${p.id})"><svg class="icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>`;
  return `<div class="qty-unit">
    <button class="qty-ring" onclick="changeQty(${p.id},-1)"><svg class="icon" viewBox="0 0 24 24"><path d="M5 12h14"/></svg></button>
    <span class="qty-digit">${qty}</span>
    <button class="qty-ring" onclick="changeQty(${p.id},1)"><svg class="icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
  </div>`;
}

function findProduct(id) {
  for (const cat of (restaurant?.categories||[])) {
    const p = cat.products.find(p=>p.id===id);
    if (p) return p;
  }
  return null;
}

function addItem(id) {
  const p=findProduct(id); if(!p)return;
  cart[id]={id,name:p.name,price:p.price,qty:1};
  refreshCtrl(id); updateBar();
}
function changeQty(id,delta) {
  if(!cart[id])return;
  cart[id].qty+=delta;
  if(cart[id].qty<=0)delete cart[id];
  refreshCtrl(id); updateBar();
  if(productModalCurrentId===id)refreshModalCtrl();
}
function refreshCtrl(id) {
  const el=document.getElementById('ctrl-'+id); if(!el)return;
  const p=findProduct(id); if(!p)return;
  const hasPhoto=!!p.photo_url;
  el.innerHTML=ctrlHtml(p,cart[id]?.qty||0,hasPhoto);
}

/* ── MODAL ── */
let productModalCurrentId=null;

function openProductModal(id) {
  const p=findProduct(id); if(!p)return;
  productModalCurrentId=id;
  const {badge,text:descText}=extractBadge(p.description);

  const photoEl=document.getElementById('productModalPhoto');
  if(p.photo_url){
    photoEl.className='modal-photo tall';
    photoEl.innerHTML=`<img src="${p.photo_url}" alt="${p.name}"><div class="modal-photo-gradient"></div>`;
  } else {
    photoEl.className='modal-photo no-photo';
    photoEl.innerHTML='';
  }

  document.getElementById('productModalBadge').innerHTML = badge?`<span>${badge}</span>`:'';
  document.getElementById('productModalName').textContent=p.name;
  document.getElementById('productModalDesc').textContent=descText||'';
  document.getElementById('productModalPrice').textContent=fmtNum(p.price);
  refreshModalCtrl();
  document.getElementById('productModalOverlay').classList.add('active');
}

function refreshModalCtrl() {
  const id=productModalCurrentId;
  const p=findProduct(id); if(!p)return;
  const qty=cart[id]?.qty||0;
  const ctrl=document.getElementById('productModalCtrl');
  if(qty===0){
    ctrl.innerHTML=`<button class="modal-add-btn" onclick="addItem(${id});refreshModalCtrl()">
      <svg class="icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> Qo'shish
    </button>`;
  } else {
    ctrl.innerHTML=`<div class="modal-qty-unit">
      <button class="qty-ring" style="width:38px;height:38px" onclick="changeQty(${id},-1)"><svg class="icon" viewBox="0 0 24 24"><path d="M5 12h14"/></svg></button>
      <span class="qty-digit" style="font-size:20px;min-width:24px">${qty}</span>
      <button class="qty-ring" style="width:38px;height:38px" onclick="changeQty(${id},1)"><svg class="icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
    </div>`;
  }
}

function closeProductModal() {
  document.getElementById('productModalOverlay').classList.remove('active');
  productModalCurrentId=null;
}

function cartItems(){return Object.values(cart);}
function cartTotal(){return cartItems().reduce((s,i)=>s+i.price*i.qty,0);}
function cartCount(){return cartItems().reduce((s,i)=>s+i.qty,0);}

function updateBar(){
  const n=cartCount();
  document.getElementById('cartCountBadge').textContent=n;
  document.getElementById('cartTotalBar').textContent=fmt(cartTotal());
  document.getElementById('cartBar').classList.toggle('visible',n>0);
}

function openCart(){renderCart();document.getElementById('cartScreen').classList.add('active');}
function closeCart(){document.getElementById('cartScreen').classList.remove('active');}

function selectType(type){
  orderType=type;
  document.getElementById('typeDelivery').classList.toggle('active',type==='delivery');
  document.getElementById('typeTakeaway').classList.toggle('active',type==='takeaway');
  document.getElementById('clientAddress').style.display=type==='delivery'?'block':'none';
}

function renderCart(){
  const list=document.getElementById('cartItemsList');
  list.innerHTML='';
  cartItems().forEach(item=>{
    const div=document.createElement('div');
    div.className='cart-item';
    div.innerHTML=`
      <div class="cart-item-gem">
        <svg class="icon" viewBox="0 0 24 24"><path d="M18 8a4 4 0 0 1 0 8M6 4v16M6 4c0 2.5 2.5 2.5 2.5 5S6 11.5 6 14"/></svg>
      </div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">${item.qty} × ${fmt(item.price)}</div>
      </div>
      <div class="qty-unit">
        <button class="qty-ring" onclick="cartChangeQty(${item.id},-1)"><svg class="icon" viewBox="0 0 24 24"><path d="M5 12h14"/></svg></button>
        <span class="qty-digit">${item.qty}</span>
        <button class="qty-ring" onclick="cartChangeQty(${item.id},1)"><svg class="icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
      </div>`;
    list.appendChild(div);
  });

  document.getElementById('summaryCount').textContent=cartCount()+' ta taom';
  document.getElementById('summarySubtotal').textContent=fmt(cartTotal());
  document.getElementById('summaryTotal').textContent=fmtNum(cartTotal());

  if(orderType==='dine_in'){
    document.getElementById('orderTypeSection').style.display='none';
    document.getElementById('clientAddress').style.display='none';
    document.getElementById('clientName').style.display='none';
    document.getElementById('clientPhone').style.display='none';
    document.getElementById('tableBanner').style.display='flex';
    document.getElementById('tableBannerTitle').textContent='Stol №'+tableNumber;
  } else {
    document.getElementById('orderTypeSection').style.display='block';
    document.getElementById('tableBanner').style.display='none';
    document.getElementById('clientName').style.display='block';
    document.getElementById('clientPhone').style.display='block';
    document.getElementById('clientAddress').style.display=orderType==='delivery'?'block':'none';
  }
}

function cartChangeQty(id,delta){
  changeQty(id,delta);
  if(cartCount()===0){closeCart();return;}
  renderCart();
}

async function submitOrder(){
  const btn=document.getElementById('checkoutBtn');
  const name=document.getElementById('clientName').value.trim();
  const phone=document.getElementById('clientPhone').value.trim();
  const address=document.getElementById('clientAddress').value.trim();
  const comment=document.getElementById('clientComment').value.trim();

  if(orderType!=='dine_in'){
    if(!name){alert('Ismingizni kiriting');return;}
    if(!phone||phone==='+998'){alert('Telefon raqamingizni kiriting');return;}
  }
  if(orderType==='delivery'&&!address){alert('Manzilni kiriting');return;}

  const tg=window.Telegram?.WebApp;
  const initData=tg?.initData;
  if(!initData){alert('Telegram Mini App dan foydalaning');return;}

  btn.disabled=true; btn.textContent='Yuborilmoqda…';

  const payload={
    client_name:name||null, client_phone:phone||null,
    order_type:orderType,
    address:orderType==='delivery'?address:null,
    table_id:orderType==='dine_in'?tableDbId:null,
    comment:comment||null,
    items:cartItems().map(i=>({product_id:i.id,quantity:i.qty}))
  };

  try {
    const res=await fetch(`${API_BASE}/api/orders/`,{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'X-Telegram-Init-Data':initData,
        'X-Restaurant-Id':String(restaurant.id),
      },
      body:JSON.stringify(payload)
    });
    if(!res.ok){const e=await res.json();throw new Error(e.detail||'Xato');}
    const order=await res.json();
    showSuccess(order.id);
  } catch(e){
    alert('Xato: '+e.message);
    btn.disabled=false; btn.textContent='Buyurtma berish';
  }
}

function showSuccess(orderId){
  document.getElementById('successOrderId').textContent='#'+String(orderId).padStart(4,'0');
  const msgs={dine_in:'Buyurtmangiz qabul qilindi! Tez orada stolga yetkaziladi',takeaway:"Tayyor bo'lganda xabar beramiz",delivery:'Tez orada yetkaziladi'};
  document.getElementById('successSubtitle').textContent=msgs[orderType]||msgs.delivery;
  document.getElementById('cartScreen').classList.remove('active');
  document.getElementById('successScreen').classList.add('active');
  cart={}; updateBar();
}

function backToMenu(){
  document.getElementById('successScreen').classList.remove('active');
  renderMenu();
}

window.addEventListener('DOMContentLoaded',()=>{
  const tg=window.Telegram?.WebApp;
  if(tg){tg.ready();tg.expand();}
  parseParams();
  loadMenu();
});

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/static/sw.js')
      .then(r=>console.log('[SW]',r.scope))
      .catch(e=>console.warn('[SW]',e));
  });
}

let _deferredInstallPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault(); _deferredInstallPrompt=e;
  const b=document.getElementById('installBanner');
  if(b) b.style.display='flex';
});
window.addEventListener('appinstalled',()=>{
  _deferredInstallPrompt=null;
  const b=document.getElementById('installBanner');
