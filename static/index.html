<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Taomly</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg-primary:  #FAF6EE;
  --bg-card:     #FFFFFF;
  --bg-section:  #F2E9D8;
  --gold:        #B8860B;
  --gold-light:  #D4AF37;
  --gold-pale:   #F0E2B6;
  --ruby:        #8B1A2E;
  --ruby-light:  #A52338;
  --text-main:   #1A0A0F;
  --text-sub:    #7A5C48;
  --border:      rgba(184,134,11,0.2);
  --border-mid:  rgba(184,134,11,0.35);
  --shadow-card: 0 2px 16px rgba(139,26,46,0.08), 0 1px 4px rgba(0,0,0,0.06);
  --shadow-bar:  0 -4px 32px rgba(139,26,46,0.15);
}

body {
  font-family:'Inter',sans-serif;
  background:var(--bg-primary);
  color:var(--text-main);
  min-height:100vh;
  overflow-x:hidden;
}

/* ─── ORNAMENT BG ─── */
.ornament-bg {
  position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;
}
.ornament-bg svg {
  position:absolute; bottom:-80px; right:-80px;
  width:420px; height:420px; opacity:0.045;
}
.ornament-top {
  position:absolute; top:-60px; left:-60px;
  width:280px; height:280px; opacity:0.03;
}

/* ─── SPLASH ─── */
#splash {
  position:fixed; inset:0;
  background:var(--bg-primary);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:999; transition:opacity 0.6s ease;
}
#splash.hidden { opacity:0; pointer-events:none; }

.splash-ring {
  position:relative; width:110px; height:110px;
  display:flex; align-items:center; justify-content:center;
  margin-bottom:28px;
}
.splash-ring svg { position:absolute; inset:0; width:100%; height:100%; animation:slowRotate 12s linear infinite; }
.splash-ring-inner {
  font-family:'Playfair Display',serif;
  font-size:36px; color:var(--ruby); z-index:1;
}
@keyframes slowRotate { to { transform:rotate(360deg); } }

.splash-name {
  font-family:'Playfair Display',serif;
  font-size:34px; font-weight:700;
  color:var(--ruby); letter-spacing:3px;
}
.splash-tagline {
  font-family:'Cormorant Garamond',serif;
  font-style:italic; font-size:17px;
  color:var(--gold); margin-top:6px; letter-spacing:1px;
}
.splash-divider {
  display:flex; align-items:center; gap:10px; margin-top:22px;
}
.splash-divider-line {
  height:1px; background:var(--gold); opacity:0.5;
  animation:expandLine 1.2s ease forwards; width:0;
}
@keyframes expandLine { to { width:60px; } }
.splash-divider-dot { color:var(--gold); font-size:10px; opacity:0.7; }

/* ─── HEADER ─── */
.header {
  background:var(--bg-primary);
  border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:100;
  padding:14px 16px 0;
  box-shadow:0 2px 12px rgba(139,26,46,0.06);
}

/* тонкий орнаментальный бордер сверху */
.header::before {
  content:'';
  position:absolute; top:0; left:0; right:0;
  height:3px;
  background:linear-gradient(90deg, var(--ruby), var(--gold-light), var(--ruby));
}

.restaurant-row {
  display:flex; align-items:center; gap:12px;
  padding-bottom:14px; position:relative; z-index:1;
}
.restaurant-logo {
  width:48px; height:48px; border-radius:14px;
  border:1.5px solid var(--border-mid);
  background:var(--bg-section);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
  box-shadow:0 2px 8px rgba(184,134,11,0.15);
}
.restaurant-logo-letter {
  font-family:'Playfair Display',serif;
  font-size:22px; font-weight:700; color:var(--ruby);
}
.restaurant-name {
  font-family:'Playfair Display',serif;
  font-size:20px; font-weight:700; color:var(--text-main);
  letter-spacing:0.3px;
}
.restaurant-address {
  font-family:'Cormorant Garamond',serif;
  font-style:italic; font-size:13px;
  color:var(--text-sub); margin-top:2px;
}
.table-badge {
  display:inline-flex; align-items:center; gap:5px;
  margin-top:5px; padding:3px 10px;
  border:1px solid var(--border-mid);
  border-radius:8px; background:var(--gold-pale);
  font-size:12px; font-weight:600; color:var(--ruby);
}

/* ─── CATEGORIES ─── */
.categories-scroll {
  display:flex; gap:8px; overflow-x:auto;
  padding-bottom:12px; scrollbar-width:none;
  position:relative; z-index:1;
}
.categories-scroll::-webkit-scrollbar { display:none; }
.cat-btn {
  flex-shrink:0; padding:7px 18px; border-radius:20px;
  border:1.5px solid var(--border);
  background:transparent;
  font-family:'Inter',sans-serif;
  font-size:13px; font-weight:500;
  color:var(--text-sub); cursor:pointer;
  transition:all 0.2s; white-space:nowrap;
}
.cat-btn.active {
  background:var(--ruby);
  border-color:var(--ruby);
  color:#FFF8EE; font-weight:600;
  box-shadow:0 4px 14px rgba(139,26,46,0.3);
}

/* ─── MAIN CONTENT ─── */
.main { padding:20px 16px 130px; position:relative; z-index:1; }
.category-section { margin-bottom:32px; scroll-margin-top: 130px; }

.category-title-wrap {
  display:flex; align-items:center; gap:10px; margin-bottom:14px;
}
.category-title-line { flex:1; height:1px; background:var(--border); }
.category-diamond {
  width:6px; height:6px;
  background:var(--gold-light);
  transform:rotate(45deg); flex-shrink:0;
}
.category-title {
  font-family:'Playfair Display',serif;
  font-size:13px; font-weight:600; color:var(--gold);
  letter-spacing:2.5px; text-transform:uppercase; white-space:nowrap;
}

.products-grid { display:flex; flex-direction:column; gap:10px; }

/* ─── PRODUCT CARD ─── */
.product-card {
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:18px;
  display:flex; align-items:center; gap:14px; padding:14px;
  transition:all 0.2s; cursor:pointer;
  box-shadow:var(--shadow-card);
}
.product-card:active {
  transform:scale(0.985);
  border-color:var(--border-mid);
  box-shadow:0 4px 20px rgba(139,26,46,0.12);
}

.product-img {
  width:82px; height:82px; border-radius:14px;
  background:var(--bg-section); flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden; border:1px solid var(--border);
}
.product-img img { width:100%; height:100%; object-fit:cover; border-radius:14px; }
.product-img-placeholder {
  width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
}
.product-img-placeholder svg { width:44px; height:44px; opacity:0.25; }

.product-info { flex:1; min-width:0; }
.product-name {
  font-family:'Inter',sans-serif;
  font-size:14px; font-weight:600; color:var(--text-main);
  margin-bottom:3px; line-height:1.3;
}
.product-desc {
  font-size:12px; color:var(--text-sub); line-height:1.4;
  margin-bottom:8px;
  overflow:hidden; display:-webkit-box;
  -webkit-line-clamp:2; -webkit-box-orient:vertical;
}
.product-footer { display:flex; align-items:center; justify-content:space-between; }
.product-price {
  font-family:'Cormorant Garamond',serif;
  font-style:italic; font-size:22px; font-weight:600;
  color:var(--ruby); line-height:1;
}

.add-btn {
  width:34px; height:34px; border-radius:50%;
  background:var(--ruby); border:none;
  color:#FFF8EE; font-size:22px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all 0.15s;
  box-shadow:0 3px 12px rgba(139,26,46,0.35);
}
.add-btn:active { background:var(--gold); transform:scale(0.9); }

.qty-control { display:flex; align-items:center; gap:8px; }
.qty-btn {
  width:28px; height:28px; border-radius:50%;
  border:1.5px solid var(--border-mid);
  background:var(--bg-section); color:var(--ruby);
  font-size:16px; font-weight:700; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.qty-num {
  font-family:'Cormorant Garamond',serif;
  font-size:18px; font-weight:600; color:var(--text-main);
  min-width:20px; text-align:center;
}

/* ─── CART BAR ─── */
.cart-bar {
  position:fixed; bottom:0; left:0; right:0;
  padding:12px 16px 28px;
  background:linear-gradient(to top, var(--bg-primary) 60%, transparent);
  z-index:200;
  transform:translateY(100%);
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.cart-bar.visible { transform:translateY(0); }
.cart-btn {
  width:100%; padding:15px 20px;
  background:linear-gradient(135deg, var(--ruby), var(--ruby-light));
  border:1px solid rgba(212,175,55,0.4);
  border-radius:16px; color:#FFF8EE;
  font-family:'Inter',sans-serif;
  font-size:15px; font-weight:700; cursor:pointer;
  display:flex; align-items:center; justify-content:space-between;
  box-shadow:0 8px 28px rgba(139,26,46,0.4), 0 0 0 1px rgba(212,175,55,0.15);
}
.cart-btn-left { display:flex; align-items:center; gap:10px; }
.cart-count-badge {
  background:rgba(212,175,55,0.25);
  border:1px solid rgba(212,175,55,0.5);
  border-radius:8px; padding:2px 9px;
  font-size:13px; font-weight:700; color:var(--gold-light);
}
.cart-total-text {
  font-family:'Cormorant Garamond',serif;
  font-style:italic; font-size:18px; color:var(--gold-light);
}

/* ─── SCREENS ─── */
.screen {
  display:none; position:fixed; inset:0;
  background:var(--bg-primary); z-index:300; overflow-y:auto;
  animation:slideUp 0.28s cubic-bezier(0.34,1.2,0.64,1);
}
.screen.active { display:block; }
@keyframes slideUp {
  from { transform:translateY(28px); opacity:0; }
  to   { transform:translateY(0); opacity:1; }
}

.screen-header {
  background:var(--bg-primary);
  padding:14px 16px;
  display:flex; align-items:center; gap:12px;
  position:sticky; top:0; z-index:10;
  border-bottom:1px solid var(--border);
  box-shadow:0 2px 12px rgba(139,26,46,0.06);
}
.screen-header::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg, var(--ruby), var(--gold-light), var(--ruby));
}
.back-btn {
  width:36px; height:36px; border-radius:10px;
  border:1.5px solid var(--border-mid);
  background:var(--bg-section); font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  color:var(--ruby);
}
.screen-title {
  font-family:'Playfair Display',serif;
  font-size:18px; font-weight:700; color:var(--text-main);
}

/* ─── CART ITEMS ─── */
.cart-items { padding:16px; display:flex; flex-direction:column; gap:10px; }
.cart-item {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:14px; padding:12px 14px;
  display:flex; align-items:center; gap:12px;
  box-shadow:var(--shadow-card);
}
.cart-item-gem {
  width:40px; height:40px; border-radius:10px;
  background:var(--bg-section); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; font-size:16px; color:var(--gold);
}
.cart-item-info { flex:1; }
.cart-item-name { font-size:14px; font-weight:600; color:var(--text-main); }
.cart-item-price {
  font-family:'Cormorant Garamond',serif;
  font-style:italic; font-size:16px; color:var(--ruby); margin-top:3px;
}

/* ─── ORDER TYPE ─── */
.order-type-section { padding:0 16px 16px; }
.section-label {
  font-size:11px; font-weight:600; color:var(--text-sub);
  text-transform:uppercase; letter-spacing:2px; margin-bottom:10px;
}
.order-type-btns { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.type-btn {
  padding:14px 10px; border-radius:14px;
  border:1.5px solid var(--border);
  background:var(--bg-card); text-align:center; cursor:pointer;
  transition:all 0.2s;
}
.type-btn.active {
  border-color:var(--ruby);
  background:rgba(139,26,46,0.05);
  box-shadow:0 4px 16px rgba(139,26,46,0.1);
}
.type-btn-icon { font-size:22px; margin-bottom:4px; }
.type-btn-label { font-size:13px; font-weight:600; color:var(--text-main); }

.table-info-banner {
  margin:0 16px 16px; padding:14px 16px;
  background:var(--gold-pale);
  border:1px solid var(--border-mid);
  border-radius:14px; display:flex; align-items:center; gap:12px;
}
.table-info-banner-title { font-size:14px; font-weight:700; color:var(--ruby); }
.table-info-banner-sub { font-size:12px; color:var(--text-sub); margin-top:2px; }

/* ─── FORM ─── */
.form-section { padding:0 16px 16px; display:flex; flex-direction:column; gap:10px; }
.form-input {
  width:100%; padding:14px 16px; border-radius:14px;
  border:1.5px solid var(--border);
  background:var(--bg-card); font-size:15px; color:var(--text-main);
  outline:none; transition:border-color 0.2s;
  font-family:'Inter',sans-serif;
}
.form-input:focus { border-color:var(--ruby); }
.form-input::placeholder { color:var(--text-sub); opacity:0.6; }
.form-textarea { resize:none; height:80px; }

/* ─── SUMMARY ─── */
.summary-card {
  margin:0 16px 16px; background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:16px; padding:16px;
  box-shadow:var(--shadow-card);
}
.summary-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:6px 0; font-size:14px; color:var(--text-sub);
}
.summary-row.total {
  border-top:1px solid var(--border); margin-top:6px; padding-top:12px;
  font-size:15px; font-weight:700; color:var(--text-main);
}
.summary-row.total span:last-child {
  font-family:'Cormorant Garamond',serif;
  font-style:italic; font-size:24px; color:var(--ruby);
}

.checkout-btn {
  margin:0 16px 40px; width:calc(100% - 32px); padding:16px;
  background:linear-gradient(135deg, var(--ruby), var(--ruby-light));
  border:1px solid rgba(212,175,55,0.35);
  border-radius:16px; color:#FFF8EE;
  font-family:'Inter',sans-serif;
  font-size:16px; font-weight:700; cursor:pointer;
  transition:transform 0.1s;
  box-shadow:0 8px 28px rgba(139,26,46,0.4);
}
.checkout-btn:active { transform:scale(0.98); }
.checkout-btn:disabled { opacity:0.5; cursor:not-allowed; }

/* ─── SUCCESS ─── */
#successScreen.active {
  display:flex !important; flex-direction:column; align-items:center;
  justify-content:center; min-height:100vh; padding:32px; text-align:center;
}
.success-anim {
  width:100px; height:100px;
  background:var(--gold-pale); border:1.5px solid var(--border-mid);
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:42px; margin-bottom:24px;
  animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow:0 8px 32px rgba(184,134,11,0.2);
}
@keyframes popIn { from { transform:scale(0); opacity:0; } to { transform:scale(1); opacity:1; } }
.success-title {
  font-family:'Playfair Display',serif;
  font-size:26px; font-weight:700; color:var(--text-main); margin-bottom:10px;
}
.success-subtitle { font-size:15px; color:var(--text-sub); line-height:1.5; margin-bottom:28px; }
.success-order-id {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:14px; padding:14px 28px;
  font-size:13px; color:var(--text-sub); margin-bottom:28px;
  box-shadow:var(--shadow-card);
}
.success-order-id strong {
  font-family:'Cormorant Garamond',serif;
  font-style:italic; color:var(--ruby);
  font-size:30px; display:block; margin-top:4px;
}
.back-to-menu-btn {
  padding:15px 40px;
  background:linear-gradient(135deg, var(--ruby), var(--ruby-light));
  border:1px solid rgba(212,175,55,0.35);
  border-radius:14px; color:#FFF8EE;
  font-family:'Inter',sans-serif;
  font-size:15px; font-weight:700; cursor:pointer;
  box-shadow:0 8px 28px rgba(139,26,46,0.35);
}

/* ─── UTILS ─── */
.loading {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; min-height:60vh; gap:16px;
  color:var(--text-sub); font-size:14px;
}
.spinner {
  width:36px; height:36px;
  border:2px solid var(--border);
  border-top-color:var(--ruby);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.error-msg { text-align:center; padding:40px 20px; color:var(--text-sub); font-size:14px; line-height:1.6; }
</style>
</head>
<body>

<!-- ─── ORNAMENT BG ─── -->
<div class="ornament-bg">
  <!-- нижний правый угол — большой -->
  <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

      <polygon points="100,10 115,55 162,55 126,82 140,127 100,100 60,127 74,82 38,55 85,55"/>

<!-- ─── SPLASH ─── -->
<div id="splash">
  <div class="splash-ring">
    <svg viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg">
      <g fill="none" stroke="#B8860B" stroke-width="0.8">
        <polygon points="55,4 63,30 90,30 69,47 77,73 55,56 33,73 41,47 20,30 47,30"/>
        <circle cx="55" cy="55" r="48" stroke-dasharray="3 4" opacity="0.6"/>
        <circle cx="55" cy="55" r="36" opacity="0.4"/>
      </g>
    </svg>
    <div class="splash-ring-inner">✦</div>
  </div>
  <div class="splash-name" id="splashName">Taomly</div>
  <div class="splash-tagline">Mazali taomlar buyurtmasi</div>
  <div class="splash-divider">
    <div class="splash-divider-line"></div>
    <div class="splash-divider-dot">◆</div>
    <div class="splash-divider-line"></div>
  </div>
</div>

<!-- ─── MENU SCREEN ─── -->
<div id="menuScreen">
  <div class="header">
    <div class="restaurant-row">
      <div class="restaurant-logo">
        <div class="restaurant-logo-letter" id="restaurantLetter">✦</div>
      </div>
      <div>
        <div class="restaurant-name" id="restaurantName">Yuklanmoqda...</div>
        <div class="restaurant-address" id="restaurantAddress"></div>
        <div id="tableBadge" style="display:none;" class="table-badge">🪑 <span id="tableBadgeText"></span></div>
      </div>
    </div>
    <div class="categories-scroll" id="categoriesNav"></div>
  </div>
  <div class="main" id="menuContent">
    <div class="loading"><div class="spinner"></div>Menyu yuklanmoqda...</div>
  </div>
</div>

<!-- ─── CART SCREEN ─── -->
<div id="cartScreen" class="screen">
  <div class="screen-header">
    <button class="back-btn" onclick="closeCart()">←</button>
    <span class="screen-title">Savat</span>
  </div>
  <div class="cart-items" id="cartItemsList"></div>

  <div class="order-type-section" id="orderTypeSection">
    <div class="section-label">Buyurtma turi</div>
    <div class="order-type-btns">
      <div class="type-btn active" id="typeDelivery" onclick="selectType('delivery')">
        <div class="type-btn-icon">🛵</div>
        <div class="type-btn-label">Yetkazib berish</div>
      </div>
      <div class="type-btn" id="typeTakeaway" onclick="selectType('takeaway')">
        <div class="type-btn-icon">🥡</div>
        <div class="type-btn-label">Olib ketish</div>
      </div>
    </div>
  </div>

  <div class="table-info-banner" id="tableBanner" style="display:none;">
    <div style="font-size:26px;">🪑</div>
    <div>
      <div class="table-info-banner-title" id="tableBannerTitle">Stol №1</div>
      <div class="table-info-banner-sub">Buyurtma stolga yetkaziladi</div>
    </div>
  </div>

  <div class="form-section">
    <input class="form-input" type="text" id="clientName" placeholder="Ismingiz" />
    <input class="form-input" type="tel" id="clientPhone" placeholder="+998 XX XXX XX XX" value="+998" />
    <input class="form-input" type="text" id="clientAddress" placeholder="Manzil (yetkazib berish uchun)" />
    <textarea class="form-input form-textarea" id="clientComment" placeholder="Izoh (ixtiyoriy)"></textarea>
  </div>

  <div class="summary-card">
    <div class="summary-row">
      <span id="summaryCount">0 ta taom</span>
      <span id="summarySubtotal">0 so'm</span>
    </div>
    <div class="summary-row total">
      <span>Jami</span>
      <span id="summaryTotal">0 so'm</span>
    </div>
  </div>
  <button class="checkout-btn" id="checkoutBtn" onclick="submitOrder()">Buyurtma berish →</button>
</div>

<!-- ─── SUCCESS SCREEN ─── -->
<div id="successScreen" class="screen">
  <div class="success-anim">✦</div>
  <div class="success-title">Buyurtma qabul qilindi!</div>
  <div class="success-subtitle" id="successSubtitle">Tez orada siz bilan bog'lanamiz.</div>
  <div class="success-order-id">
    Buyurtma raqami
    <strong id="successOrderId">#0000</strong>
  </div>
  <button class="back-to-menu-btn" onclick="backToMenu()">Menyuga qaytish</button>
</div>

<!-- ─── CART BAR ─── -->
<div class="cart-bar" id="cartBar">
  <button class="cart-btn" onclick="openCart()">
    <div class="cart-btn-left">
      <span>Savat</span>
      <span class="cart-count-badge" id="cartCountBadge">0</span>
    </div>
    <span class="cart-total-text" id="cartTotalBar">0 so'm</span>
  </button>
</div>

<script>
const API_BASE = '';
const DEFAULT_SLUG = 'chinar';

let restaurant = null;
let cart = {};
let orderType = 'delivery';
let tableNumber = null;
let tableDbId = null;
let restaurantSlug = DEFAULT_SLUG;

const placeholderSVG = `<div class="product-img-placeholder"><svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><g fill="none" stroke="#B8860B" stroke-width="0.8"><polygon points="24,3 28,16 42,16 31,24 35,37 24,29 13,37 17,24 6,16 20,16"/><circle cx="24" cy="24" r="14" stroke-dasharray="2 3" opacity="0.5"/></g></svg></div>`;

function parseParams() {
  const urlParams = new URLSearchParams(window.location.search);
  const slugParam = urlParams.get('slug');
  const tableParam = urlParams.get('table');
  if (slugParam) {
    restaurantSlug = slugParam;
    if (tableParam) { tableNumber = tableParam; orderType = 'dine_in'; }
    return;
  }
  const tg = window.Telegram?.WebApp;
  const startParam = tg?.initDataUnsafe?.start_param || '';
  if (startParam) {
    const parts = startParam.split('_');
    if (parts.length >= 2 && !isNaN(parts[parts.length - 1])) {
      tableNumber = parts[parts.length - 1];
      restaurantSlug = parts.slice(0, -1).join('_');
      orderType = 'dine_in';
    } else { restaurantSlug = startParam; }
  }
}

function fmt(p) { return p.toLocaleString('uz-UZ') + ' so\'m'; }

async function loadMenu() {
  try {
    const res = await fetch(`${API_BASE}/api/restaurants/${restaurantSlug}`);
    if (!res.ok) throw new Error('Server xatosi');
    restaurant = await res.json();

    document.getElementById('splashName').textContent = restaurant.name;
    document.getElementById('restaurantName').textContent = restaurant.name;
    document.getElementById('restaurantAddress').textContent = restaurant.address || '';

    // первая буква в логотипе
    const letter = restaurant.name ? restaurant.name[0].toUpperCase() : '✦';
    document.getElementById('restaurantLetter').textContent = letter;

    if (tableNumber) {
      document.getElementById('tableBadgeText').textContent = 'Stol №' + tableNumber;
      document.getElementById('tableBadge').style.display = 'inline-flex';
      await resolveTableId();
    }

    renderCategories();
    renderMenu();

    setTimeout(() => {
      document.getElementById('splash').classList.add('hidden');
    }, 1400);

  } catch (e) {
    document.getElementById('menuContent').innerHTML =
      `<div class="error-msg">Menyu yuklanmadi.<br>Qayta urinib ko'ring.</div>`;
    document.getElementById('splash').classList.add('hidden');
  }
}

async function resolveTableId() {
  try {
    const res = await fetch(`${API_BASE}/api/restaurants/${restaurantSlug}/table/${tableNumber}`);
    if (res.ok) { const data = await res.json(); tableDbId = data.table_id; }
  } catch (e) { tableDbId = null; }
}

function renderCategories() {
  const nav = document.getElementById('categoriesNav');
  nav.innerHTML = '';
  restaurant.categories.forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (i === 0 ? ' active' : '');
    btn.textContent = cat.name;
    btn.onclick = () => {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const el = document.getElementById('cat-' + cat.id);
      if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
    };
    nav.appendChild(btn);
  });
}

function renderMenu() {
  const content = document.getElementById('menuContent');
  content.innerHTML = '';
  restaurant.categories.forEach((cat) => {
    if (!cat.products || cat.products.length === 0) return;
    const sec = document.createElement('div');
    sec.className = 'category-section';
    sec.id = 'cat-' + cat.id;
    sec.innerHTML = `
      <div class="category-title-wrap">
        <div class="category-title-line"></div>
        <div class="category-diamond"></div>
        <div class="category-title">${cat.name}</div>
        <div class="category-diamond"></div>
        <div class="category-title-line"></div>
      </div>
      <div class="products-grid" id="grid-${cat.id}"></div>`;
    content.appendChild(sec);
    const grid = sec.querySelector('#grid-' + cat.id);
    cat.products.forEach(p => grid.appendChild(makeCard(p)));
  });
}

function makeCard(p) {
  const div = document.createElement('div');
  div.className = 'product-card';
  div.id = 'card-' + p.id;
  const qty = cart[p.id]?.qty || 0;
  const imgHtml = p.photo_url
    ? `<img src="${p.photo_url}" alt="${p.name}">`
    : placeholderSVG;
  div.innerHTML = `
    <div class="product-img">${imgHtml}</div>
    <div class="product-info">
      <div class="product-name">${p.name}</div>
      ${p.description ? `<div class="product-desc">${p.description}</div>` : ''}
      <div class="product-footer">
        <div class="product-price">${fmt(p.price)}</div>
        <div id="ctrl-${p.id}">${ctrlHtml(p, qty)}</div>
      </div>
    </div>`;
  return div;
}

function ctrlHtml(p, qty) {
  if (qty === 0) return `<button class="add-btn" onclick="addItem(${p.id})">+</button>`;
  return `<div class="qty-control">
    <button class="qty-btn" onclick="changeQty(${p.id},-1)">−</button>
    <span class="qty-num">${qty}</span>
    <button class="qty-btn" onclick="changeQty(${p.id},1)">+</button>
  </div>`;
}

function findProduct(id) {
  for (const cat of restaurant.categories) {
    const p = cat.products.find(p => p.id === id);
    if (p) return p;
  }
  return null;
}

function addItem(id) {
  const p = findProduct(id);
  if (!p) return;
  cart[id] = { id, name:p.name, price:p.price, qty:1 };
  refreshCtrl(id); updateBar();
}

function changeQty(id, delta) {
  if (!cart[id]) return;
  cart[id].qty += delta;
  if (cart[id].qty <= 0) delete cart[id];
  refreshCtrl(id); updateBar();
}

function refreshCtrl(id) {
  const el = document.getElementById('ctrl-' + id);
  if (!el) return;
  const p = findProduct(id);
  if (!p) return;
  el.innerHTML = ctrlHtml(p, cart[id]?.qty || 0);
}

function cartItems() { return Object.values(cart); }
function cartTotal() { return cartItems().reduce((s,i) => s + i.price * i.qty, 0); }
function cartCount() { return cartItems().reduce((s,i) => s + i.qty, 0); }

function updateBar() {
  const n = cartCount();
  document.getElementById('cartCountBadge').textContent = n;
  document.getElementById('cartTotalBar').textContent = fmt(cartTotal());
  document.getElementById('cartBar').classList.toggle('visible', n > 0);
}

function openCart() { renderCart(); document.getElementById('cartScreen').classList.add('active'); }
function closeCart() { document.getElementById('cartScreen').classList.remove('active'); }

function selectType(type) {
  orderType = type;
  document.getElementById('typeDelivery').classList.toggle('active', type === 'delivery');
  document.getElementById('typeTakeaway').classList.toggle('active', type === 'takeaway');
  document.getElementById('clientAddress').style.display = type === 'delivery' ? 'block' : 'none';
}

function renderCart() {
  const list = document.getElementById('cartItemsList');
  list.innerHTML = '';
  cartItems().forEach(item => {
    const div = document.createElement('div');
    div.className = 'cart-item';
    div.innerHTML = `
      <div class="cart-item-gem">◆</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">${item.qty} × ${fmt(item.price)}</div>
      </div>
      <div class="qty-control">
        <button class="qty-btn" onclick="cartChangeQty(${item.id},-1)">−</button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn" onclick="cartChangeQty(${item.id},1)">+</button>
      </div>`;
    list.appendChild(div);
  });

  document.getElementById('summaryCount').textContent = cartCount() + ' ta taom';
  document.getElementById('summarySubtotal').textContent = fmt(cartTotal());
  document.getElementById('summaryTotal').textContent = fmt(cartTotal());

  if (orderType === 'dine_in') {
    document.getElementById('orderTypeSection').style.display = 'none';
    document.getElementById('clientAddress').style.display = 'none';
    document.getElementById('clientName').style.display = 'none';
    document.getElementById('clientPhone').style.display = 'none';
    document.getElementById('tableBanner').style.display = 'flex';
    document.getElementById('tableBannerTitle').textContent = 'Stol №' + tableNumber;
  } else {
    document.getElementById('orderTypeSection').style.display = 'block';
    document.getElementById('tableBanner').style.display = 'none';
    document.getElementById('clientName').style.display = 'block';
    document.getElementById('clientPhone').style.display = 'block';
    document.getElementById('clientAddress').style.display = orderType === 'delivery' ? 'block' : 'none';
  }
}

function cartChangeQty(id, delta) {
  changeQty(id, delta);
  if (cartCount() === 0) { closeCart(); return; }
  renderCart();
}

async function submitOrder() {
  const btn = document.getElementById('checkoutBtn');
  const name = document.getElementById('clientName').value.trim();
  const phone = document.getElementById('clientPhone').value.trim();
  const address = document.getElementById('clientAddress').value.trim();
  const comment = document.getElementById('clientComment').value.trim();

  if (orderType !== 'dine_in') {
    if (!name) { alert('Ismingizni kiriting'); return; }
    if (!phone || phone === '+998') { alert('Telefon raqamingizni kiriting'); return; }
  }
  if (orderType === 'delivery' && !address) { alert('Manzilni kiriting'); return; }

  btn.disabled = true;
  btn.textContent = 'Yuborilmoqda...';

  const tg = window.Telegram?.WebApp;
  const tgUser = tg?.initDataUnsafe?.user;

  const payload = {
    restaurant_id: restaurant.id,
    client_telegram_id: tgUser?.id || null,
    client_name: name || null,
    client_phone: phone || null,
    order_type: orderType,
    address: orderType === 'delivery' ? address : null,
    table_id: orderType === 'dine_in' ? tableDbId : null,
    comment: comment || null,
    items: cartItems().map(i => ({ product_id:i.id, quantity:i.qty }))
  };

  try {
    const res = await fetch(`${API_BASE}/api/orders/`, {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body:JSON.stringify(payload)
    });
    if (!res.ok) { const err = await res.json(); throw new Error(err.detail || 'Xato'); }
    const order = await res.json();
    showSuccess(order.id);
  } catch (e) {
    alert('Xato: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Buyurtma berish →';
  }
}

function showSuccess(orderId) {
  document.getElementById('successOrderId').textContent = '#' + String(orderId).padStart(4,'0');
  if (orderType === 'dine_in') {
    document.getElementById('successSubtitle').textContent = 'Buyurtmangiz qabul qilindi! Tez orada stolga yetkaziladi';
  } else if (orderType === 'takeaway') {
    document.getElementById('successSubtitle').textContent = "Tayyor bo'lganda xabar beramiz";
  } else {
    document.getElementById('successSubtitle').textContent = 'Tez orada yetkaziladi';
  }
  document.getElementById('cartScreen').classList.remove('active');
  document.getElementById('successScreen').classList.add('active');
  cart = {}; updateBar();
}

function backToMenu() {
  document.getElementById('successScreen').classList.remove('active');
  renderMenu();
}

window.addEventListener('DOMContentLoaded', () => {
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }
  parseParams();
  loadMenu();
});
</script>
</body>
</html>
