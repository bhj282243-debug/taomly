<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Taomly</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0A0D12;
    --surface: #111827;
    --surface2: #161D2A;
    --text: #E5E7EB;
    --text2: #9CA3AF;
    --accent: #4DA3FF;
    --success: #22C55E;
    --warning: #F59E0B;
    --danger: #EF4444;
    --border: rgba(255,255,255,0.06);
    --radius-sm: 12px;
    --radius-md: 16px;
    --radius-lg: 20px;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── SPLASH ─── */
  #splash {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 999; transition: opacity 0.4s ease;
  }
  #splash.hidden { opacity: 0; pointer-events: none; }
  .splash-logo {
    width: 88px; height: 88px; background: var(--accent);
    border-radius: 24px; display: flex; align-items: center;
    justify-content: center; font-size: 44px; margin-bottom: 20px;
    box-shadow: 0 0 40px rgba(77,163,255,0.3);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 40px rgba(77,163,255,0.3); }
    50% { box-shadow: 0 0 60px rgba(77,163,255,0.5); }
  }
  .splash-name { font-size: 28px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
  .splash-sub { font-size: 14px; color: var(--text2); margin-top: 6px; }
  .splash-loader {
    margin-top: 48px; width: 40px; height: 3px;
    background: var(--border); border-radius: 4px; overflow: hidden;
  }
  .splash-loader-bar {
    height: 100%; background: var(--accent); border-radius: 4px;
    animation: load 1.2s ease-in-out forwards;
  }
  @keyframes load { from { width: 0%; } to { width: 100%; } }

  /* ─── HEADER ─── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    padding: 14px 16px 0;
  }
  .restaurant-info {
    display: flex; align-items: center; gap: 12px; padding-bottom: 14px;
  }
  .restaurant-logo {
    width: 42px; height: 42px; background: var(--accent);
    border-radius: var(--radius-sm); display: flex;
    align-items: center; justify-content: center; font-size: 20px;
    flex-shrink: 0;
  }
  .restaurant-name { font-size: 17px; font-weight: 700; color: var(--text); }
  .restaurant-address { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .table-badge {
    display: inline-flex; align-items: center; gap: 4px;
    margin-top: 4px; padding: 3px 10px;
    background: rgba(77,163,255,0.15);
    color: var(--accent); border-radius: 8px;
    font-size: 12px; font-weight: 600;
    border: 1px solid rgba(77,163,255,0.2);
  }

  .categories-scroll {
    display: flex; gap: 8px; overflow-x: auto;
    padding-bottom: 12px; scrollbar-width: none;
  }
  .categories-scroll::-webkit-scrollbar { display: none; }
  .cat-btn {
    flex-shrink: 0; padding: 7px 16px; border-radius: 20px;
    border: 1px solid var(--border); background: transparent;
    font-size: 13px; font-weight: 500; color: var(--text2);
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
    font-family: inherit;
  }
  .cat-btn.active {
    background: var(--accent); border-color: var(--accent);
    color: white; font-weight: 600;
  }

  /* ─── MENU ─── */
  .main { padding: 16px 16px 120px; }
  .category-section { margin-bottom: 32px; }
  .category-title {
    font-size: 13px; font-weight: 600; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.8px;
    margin-bottom: 12px; padding-left: 2px;
  }
  .products-grid { display: flex; flex-direction: column; gap: 10px; }

  .product-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    display: flex; align-items: center; gap: 12px; padding: 12px;
    transition: all 0.15s; cursor: pointer;
  }
  .product-card:active { transform: scale(0.98); background: var(--surface2); }

  .product-img {
    width: 76px; height: 76px; border-radius: var(--radius-sm);
    background: var(--surface2); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; overflow: hidden; border: 1px solid var(--border);
  }
  .product-img img { width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius-sm); }

  .product-info { flex: 1; min-width: 0; }
  .product-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; line-height: 1.3; }
  .product-desc {
    font-size: 12px; color: var(--text2); line-height: 1.4; margin-bottom: 8px;
    overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }
  .product-footer { display: flex; align-items: center; justify-content: space-between; }
  .product-price { font-size: 15px; font-weight: 700; color: var(--accent); }

  .add-btn {
    width: 32px; height: 32px; border-radius: 10px;
    background: var(--accent); border: none; color: white; font-size: 20px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: transform 0.1s; font-family: inherit;
  }
  .add-btn:active { transform: scale(0.85); }

  .qty-control { display: flex; align-items: center; gap: 8px; }
  .qty-btn {
    width: 28px; height: 28px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--accent); font-size: 16px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: inherit;
  }
  .qty-num { font-size: 15px; font-weight: 700; color: var(--text); min-width: 20px; text-align: center; }

  /* ─── CART BAR ─── */
  .cart-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 12px 16px 24px;
    background: linear-gradient(to top, var(--bg) 60%, transparent);
    z-index: 200;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .cart-bar.visible { transform: translateY(0); }
  .cart-btn {
    width: 100%; padding: 16px 20px; background: var(--accent);
    border: none; border-radius: var(--radius-md); color: white;
    font-size: 15px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
    font-family: inherit; box-shadow: 0 8px 24px rgba(77,163,255,0.3);
  }
  .cart-btn-left { display: flex; align-items: center; gap: 10px; }
  .cart-count-badge {
    background: rgba(255,255,255,0.2); border-radius: 8px;
    padding: 3px 9px; font-size: 13px; font-weight: 700;
  }

  /* ─── SCREENS ─── */
  .screen {
    display: none; position: fixed; inset: 0;
    background: var(--bg); z-index: 300; overflow-y: auto;
    animation: slideUp 0.28s cubic-bezier(0.34, 1.2, 0.64, 1);
  }
  .screen.active { display: block; }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .screen-header {
    background: var(--surface); padding: 16px;
    display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 10;
    border-bottom: 1px solid var(--border);
  }
  .back-btn {
    width: 36px; height: 36px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: transparent;
    font-size: 18px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; color: var(--text);
  }
  .screen-title { font-size: 17px; font-weight: 700; color: var(--text); }

  /* ─── CART SCREEN ─── */
  .cart-items { padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .cart-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-md); padding: 12px 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .cart-item-emoji { font-size: 28px; width: 44px; text-align: center; flex-shrink: 0; }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .cart-item-price { font-size: 13px; color: var(--accent); font-weight: 600; margin-top: 3px; }

  .divider { height: 1px; background: var(--border); margin: 4px 0; }

  .order-type-section { padding: 16px; }
  .section-label {
    font-size: 11px; font-weight: 600; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px;
  }
  .order-type-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .type-btn {
    padding: 14px 10px; border-radius: var(--radius-md);
    border: 1px solid var(--border); background: var(--surface);
    text-align: center; cursor: pointer; transition: all 0.2s;
  }
  .type-btn.active {
    border-color: var(--accent);
    background: rgba(77,163,255,0.08);
  }
  .type-btn-icon { font-size: 24px; margin-bottom: 4px; }
  .type-btn-label { font-size: 13px; font-weight: 600; color: var(--text); }

  .table-info-banner {
    margin: 16px 16px 0; padding: 14px 16px;
    background: rgba(77,163,255,0.08);
    border: 1px solid rgba(77,163,255,0.2);
    border-radius: var(--radius-md);
    display: flex; align-items: center; gap: 12px;
  }
  .table-info-banner-icon { font-size: 28px; }
  .table-info-banner-title { font-size: 14px; font-weight: 700; color: var(--text); }
  .table-info-banner-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

  .form-section { padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .form-input {
    width: 100%; padding: 14px 16px; border-radius: var(--radius-md);
    border: 1px solid var(--border); background: var(--surface);
    font-size: 15px; color: var(--text); outline: none;
    transition: border-color 0.2s; font-family: inherit;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--text2); }
  .form-textarea { resize: none; height: 80px; }

  .summary-card {
    margin: 0 16px 16px; background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md); padding: 16px;
  }
  .summary-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0; font-size: 14px; color: var(--text2);
  }
  .summary-row.total {
    border-top: 1px solid var(--border); margin-top: 6px; padding-top: 12px;
    font-size: 16px; font-weight: 700; color: var(--text);
  }
  .summary-row.total span:last-child { color: var(--accent); }

  .checkout-btn {
    margin: 0 16px 40px; width: calc(100% - 32px); padding: 16px;
    background: var(--accent); border: none; border-radius: var(--radius-md);
    color: white; font-size: 16px; font-weight: 700;
    cursor: pointer; transition: transform 0.1s; font-family: inherit;
    box-shadow: 0 8px 24px rgba(77,163,255,0.3);
  }
  .checkout-btn:active { transform: scale(0.98); }
  .checkout-btn:disabled { background: var(--surface2); color: var(--text2); box-shadow: none; cursor: not-allowed; }

  /* ─── SUCCESS SCREEN ─── */
  #successScreen.active {
    display: flex !important; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; padding: 32px; text-align: center;
  }
  .success-anim {
    width: 100px; height: 100px;
    background: rgba(34,197,94,0.15);
    border: 2px solid var(--success);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 48px; margin-bottom: 24px;
    animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .success-title { font-size: 24px; font-weight: 800; color: var(--text); margin-bottom: 10px; }
  .success-subtitle { font-size: 15px; color: var(--text2); line-height: 1.5; margin-bottom: 32px; }
  .success-order-id {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-md); padding: 14px 24px;
    font-size: 14px; color: var(--text2); margin-bottom: 32px;
  }
  .success-order-id strong { color: var(--accent); font-size: 22px; display: block; margin-top: 4px; }
  .back-to-menu-btn {
    padding: 15px 40px; background: var(--accent); border: none;
    border-radius: var(--radius-md); color: white; font-size: 15px;
    font-weight: 700; cursor: pointer; font-family: inherit;
    box-shadow: 0 8px 24px rgba(77,163,255,0.3);
  }

  /* ─── LOADING / ERROR ─── */
  .loading {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 60vh; gap: 16px;
    color: var(--text2); font-size: 14px;
  }
  .spinner {
    width: 36px; height: 36px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { text-align: center; padding: 40px 20px; color: var(--text2); font-size: 14px; line-height: 1.6; }
</style>
</head>
<body>

<!-- ─── SPLASH ─── -->
<div id="splash">
  <div class="splash-logo">🍽️</div>
  <div class="splash-name" id="splashName">Taomly</div>
  <div class="splash-sub">Mazali taomlar buyurtmasi</div>
  <div class="splash-loader"><div class="splash-loader-bar"></div></div>
</div>

<!-- ─── MENU SCREEN ─── -->
<div id="menuScreen">
  <div class="header">
    <div class="restaurant-info">
      <div class="restaurant-logo">🍽️</div>
      <div>
        <div class="restaurant-name" id="restaurantName">Yuklanmoqda...</div>
        <div class="restaurant-address" id="restaurantAddress"></div>
        <div id="tableBadge" style="display:none;" class="table-badge">🪑 <span id="tableBadgeText"></span></div>
      </div>
    </div>
    <div class="categories-scroll" id="categoriesNav"></div>
  </div>
  <div class="main" id="menuContent">
    <div class="loading"><div class="spinner"></div>Menyu yuklanmoqda...</div>
  </div>
</div>

<!-- ─── CART SCREEN ─── -->
<div id="cartScreen" class="screen">
  <div class="screen-header">
    <button class="back-btn" onclick="closeCart()">←</button>
    <span class="screen-title">Savat</span>
  </div>
  <div class="cart-items" id="cartItemsList"></div>
  <div class="divider"></div>

  <div class="order-type-section" id="orderTypeSection">
    <div class="section-label">Buyurtma turi</div>
    <div class="order-type-btns">
      <div class="type-btn active" id="typeDelivery" onclick="selectType('delivery')">
        <div class="type-btn-icon">🛵</div>
        <div class="type-btn-label">Yetkazib berish</div>
      </div>
      <div class="type-btn" id="typeTakeaway" onclick="selectType('takeaway')">
        <div class="type-btn-icon">🥡</div>
        <div class="type-btn-label">Olib ketish</div>
      </div>
    </div>
  </div>

  <div class="table-info-banner" id="tableBanner" style="display:none;">
    <div class="table-info-banner-icon">🪑</div>
    <div>
      <div class="table-info-banner-title" id="tableBannerTitle">Stol №1</div>
      <div class="table-info-banner-sub">Buyurtma stolga yetkaziladi</div>
    </div>
  </div>

  <div class="form-section">
    <input class="form-input" type="text" id="clientName" placeholder="Ismingiz" />
    <input class="form-input" type="tel" id="clientPhone" placeholder="+998 XX XXX XX XX" value="+998" />
    <input class="form-input" type="text" id="clientAddress" placeholder="Manzil (yetkazib berish uchun)" />
    <textarea class="form-input form-textarea" id="clientComment" placeholder="Izoh (ixtiyoriy)"></textarea>
  </div>

  <div class="summary-card">
    <div class="summary-row">
      <span id="summaryCount">0 ta taom</span>
      <span id="summarySubtotal">0 so'm</span>
    </div>
    <div class="summary-row total">
      <span>Jami</span>
      <span id="summaryTotal">0 so'm</span>
    </div>
  </div>
  <button class="checkout-btn" id="checkoutBtn" onclick="submitOrder()">Buyurtma berish →</button>
</div>

<!-- ─── SUCCESS SCREEN ─── -->
<div id="successScreen" class="screen">
  <div class="success-anim">✓</div>
  <div class="success-title">Buyurtma qabul qilindi!</div>
  <div class="success-subtitle" id="successSubtitle">Tez orada siz bilan bog'lanamiz.</div>
  <div class="success-order-id">
    Buyurtma raqami
    <strong id="successOrderId">#0000</strong>
  </div>
  <button class="back-to-menu-btn" onclick="backToMenu()">Menyuga qaytish</button>
</div>

<!-- ─── CART BAR ─── -->
<div class="cart-bar" id="cartBar">
  <button class="cart-btn" onclick="openCart()">
    <div class="cart-btn-left">
      <span>🛒 Savat</span>
      <span class="cart-count-badge" id="cartCountBadge">0</span>
    </div>
    <span id="cartTotalBar">0 so'm</span>
  </button>
</div>

<script>
const API_BASE = '';
const DEFAULT_SLUG = 'chinar';

let restaurant = null;
let cart = {};
let orderType = 'delivery';
let tableNumber = null;
let tableDbId = null;
let restaurantSlug = DEFAULT_SLUG;

const catEmoji = ['🍲','🍖','🔥','🥗','🍵','🥘','🍜','🫕'];

function parseParams() {
  const urlParams = new URLSearchParams(window.location.search);
  const slugParam = urlParams.get('slug');
  const tableParam = urlParams.get('table');
  if (slugParam) {
    restaurantSlug = slugParam;
    if (tableParam) { tableNumber = tableParam; orderType = 'dine_in'; }
    return;
  }
  const tg = window.Telegram?.WebApp;
  const startParam = tg?.initDataUnsafe?.start_param || '';
  if (startParam) {
    const parts = startParam.split('_');
    if (parts.length >= 2 && !isNaN(parts[parts.length - 1])) {
      tableNumber = parts[parts.length - 1];
      restaurantSlug = parts.slice(0, -1).join('_');
      orderType = 'dine_in';
    } else { restaurantSlug = startParam; }
  }
}

function fmt(p) { return p.toLocaleString('uz-UZ') + ' so\'m'; }

async function loadMenu() {
  try {
    const res = await fetch(`${API_BASE}/api/restaurants/${restaurantSlug}`);
    if (!res.ok) throw new Error('Server xatosi');
    restaurant = await res.json();

    // Обновляем splash с названием ресторана
    document.getElementById('splashName').textContent = restaurant.name;
    document.getElementById('restaurantName').textContent = restaurant.name;
    document.getElementById('restaurantAddress').textContent = restaurant.address || '';

    if (tableNumber) {
      document.getElementById('tableBadgeText').textContent = 'Stol №' + tableNumber;
      document.getElementById('tableBadge').style.display = 'inline-flex';
      await resolveTableId();
    }

    renderCategories();
    renderMenu();

    // Скрываем splash после загрузки
    setTimeout(() => {
      document.getElementById('splash').classList.add('hidden');
    }, 1200);

  } catch (e) {
    document.getElementById('menuContent').innerHTML =
      `<div class="error-msg">❌ Menyu yuklanmadi.<br>Qayta urinib ko'ring.</div>`;
    document.getElementById('splash').classList.add('hidden');
  }
}

async function resolveTableId() {
  try {
    const res = await fetch(`${API_BASE}/api/restaurants/${restaurantSlug}/table/${tableNumber}`);
    if (res.ok) { const data = await res.json(); tableDbId = data.table_id; }
  } catch (e) { tableDbId = null; }
}

function renderCategories() {
  const nav = document.getElementById('categoriesNav');
  nav.innerHTML = '';
  restaurant.categories.forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (i === 0 ? ' active' : '');
    btn.textContent = cat.name;
    btn.onclick = () => {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const el = document.getElementById('cat-' + cat.id);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    };
    nav.appendChild(btn);
  });
}

function renderMenu() {
  const content = document.getElementById('menuContent');
  content.innerHTML = '';
  restaurant.categories.forEach((cat, ci) => {
    if (!cat.products || cat.products.length === 0) return;
    const sec = document.createElement('div');
    sec.className = 'category-section';
    sec.id = 'cat-' + cat.id;
    const emoji = catEmoji[ci % catEmoji.length];
    sec.innerHTML = `<div class="category-title">${cat.name}</div><div class="products-grid" id="grid-${cat.id}"></div>`;
    content.appendChild(sec);
    const grid = sec.querySelector('#grid-' + cat.id);
    cat.products.forEach(p => grid.appendChild(makeCard(p, emoji)));
  });
}

function makeCard(p, emoji) {
  const div = document.createElement('div');
  div.className = 'product-card';
  div.id = 'card-' + p.id;
  const qty = cart[p.id]?.qty || 0;
  div.innerHTML = `
    <div class="product-img">${p.photo_url ? `<img src="${p.photo_url}" alt="${p.name}">` : emoji}</div>
    <div class="product-info">
      <div class="product-name">${p.name}</div>
      ${p.description ? `<div class="product-desc">${p.description}</div>` : ''}
      <div class="product-footer">
        <div class="product-price">${fmt(p.price)}</div>
        <div id="ctrl-${p.id}">${ctrlHtml(p, qty)}</div>
      </div>
    </div>`;
  return div;
}

function ctrlHtml(p, qty) {
  if (qty === 0) return `<button class="add-btn" onclick="addItem(${p.id})">+</button>`;
  return `<div class="qty-control">
    <button class="qty-btn" onclick="changeQty(${p.id},-1)">−</button>
    <span class="qty-num">${qty}</span>
    <button class="qty-btn" onclick="changeQty(${p.id},1)">+</button>
  </div>`;
}

function findProduct(id) {
  for (const cat of restaurant.categories) {
    const p = cat.products.find(p => p.id === id);
    if (p) return p;
  }
  return null;
}

function addItem(id) {
  const p = findProduct(id);
  if (!p) return;
  cart[id] = { id, name: p.name, price: p.price, qty: 1 };
  refreshCtrl(id); updateBar();
}

function changeQty(id, delta) {
  if (!cart[id]) return;
  cart[id].qty += delta;
  if (cart[id].qty <= 0) delete cart[id];
  refreshCtrl(id); updateBar();
}

function refreshCtrl(id) {
  const el = document.getElementById('ctrl-' + id);
  if (!el) return;
  const p = findProduct(id);
  if (!p) return;
  el.innerHTML = ctrlHtml(p, cart[id]?.qty || 0);
}

function cartItems() { return Object.values(cart); }
function cartTotal() { return cartItems().reduce((s, i) => s + i.price * i.qty, 0); }
function cartCount() { return cartItems().reduce((s, i) => s + i.qty, 0); }

function updateBar() {
  const n = cartCount();
  document.getElementById('cartCountBadge').textContent = n;
  document.getElementById('cartTotalBar').textContent = fmt(cartTotal());
  document.getElementById('cartBar').classList.toggle('visible', n > 0);
}

function openCart() { renderCart(); document.getElementById('cartScreen').classList.add('active'); }
function closeCart() { document.getElementById('cartScreen').classList.remove('active'); }

function selectType(type) {
  orderType = type;
  document.getElementById('typeDelivery').classList.toggle('active', type === 'delivery');
  document.getElementById('typeTakeaway').classList.toggle('active', type === 'takeaway');
  document.getElementById('clientAddress').style.display = type === 'delivery' ? 'block' : 'none';
}

function renderCart() {
  const list = document.getElementById('cartItemsList');
  list.innerHTML = '';
  cartItems().forEach(item => {
    const div = document.createElement('div');
    div.className = 'cart-item';
    div.innerHTML = `
      <div class="cart-item-emoji">🍽️</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">${item.qty} × ${fmt(item.price)}</div>
      </div>
      <div class="qty-control">
        <button class="qty-btn" onclick="cartChangeQty(${item.id},-1)">−</button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn" onclick="cartChangeQty(${item.id},1)">+</button>
      </div>`;
    list.appendChild(div);
  });
  document.getElementById('summaryCount').textContent = cartCount() + ' ta taom';
  document.getElementById('summarySubtotal').textContent = fmt(cartTotal());
  document.getElementById('summaryTotal').textContent = fmt(cartTotal());

  if (orderType === 'dine_in') {
    document.getElementById('orderTypeSection').style.display = 'none';
    document.getElementById('clientAddress').style.display = 'none';
    document.getElementById('clientName').style.display = 'none';
    document.getElementById('clientPhone').style.display = 'none';
    document.getElementById('tableBanner').style.display = 'flex';
    document.getElementById('tableBannerTitle').textContent = 'Stol №' + tableNumber;
  } else {
    document.getElementById('orderTypeSection').style.display = 'block';
    document.getElementById('tableBanner').style.display = 'none';
    document.getElementById('clientName').style.display = 'block';
    document.getElementById('clientPhone').style.display = 'block';
    document.getElementById('clientAddress').style.display = orderType === 'delivery' ? 'block' : 'none';
  }
}

function cartChangeQty(id, delta) {
  changeQty(id, delta);
  if (cartCount() === 0) { closeCart(); return; }
  renderCart();
}

async function submitOrder() {
  const btn = document.getElementById('checkoutBtn');
  const name = document.getElementById('clientName').value.trim();
  const phone = document.getElementById('clientPhone').value.trim();
  const address = document.getElementById('clientAddress').value.trim();
  const comment = document.getElementById('clientComment').value.trim();

  if (orderType !== 'dine_in') {
    if (!name) { alert('Ismingizni kiriting'); return; }
    if (!phone || phone === '+998') { alert('Telefon raqamingizni kiriting'); return; }
  }
  if (orderType === 'delivery' && !address) { alert('Manzilni kiriting'); return; }

  btn.disabled = true;
  btn.textContent = 'Yuborilmoqda...';

  const tg = window.Telegram?.WebApp;
  const tgUser = tg?.initDataUnsafe?.user;

  const payload = {
    restaurant_id: restaurant.id,
    client_telegram_id: tgUser?.id || null,
    client_name: name || null,
    client_phone: phone || null,
    order_type: orderType,
    address: orderType === 'delivery' ? address : null,
    table_id: orderType === 'dine_in' ? tableDbId : null,
    comment: comment || null,
    items: cartItems().map(i => ({ product_id: i.id, quantity: i.qty }))
  };

  try {
    const res = await fetch(`${API_BASE}/api/orders/`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) { const err = await res.json(); throw new Error(err.detail || 'Xato'); }
    const order = await res.json();
    showSuccess(order.id);
  } catch (e) {
    alert('Xato: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Buyurtma berish →';
  }
}

function showSuccess(orderId) {
  document.getElementById('successOrderId').textContent = '#' + String(orderId).padStart(4, '0');
  if (orderType === 'dine_in') {
    document.getElementById('successSubtitle').textContent = 'Buyurtmangiz qabul qilindi! Tez orada stolga yetkaziladi 🍽️';
  } else if (orderType === 'takeaway') {
    document.getElementById('successSubtitle').textContent = 'Tayyor bo\'lganda xabar beramiz 🥡';
  } else {
    document.getElementById('successSubtitle').textContent = 'Tez orada yetkaziladi 🛵';
  }
  document.getElementById('cartScreen').classList.remove('active');
  document.getElementById('successScreen').classList.add('active');
  cart = {}; updateBar();
}

function backToMenu() {
  document.getElementById('successScreen').classList.remove('active');
  renderMenu();
}

window.addEventListener('DOMContentLoaded', () => {
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }
  parseParams();
  loadMenu();
});
</script>
