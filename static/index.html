<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Taomly</title>

<link rel="manifest" href="/static/manifest.json" id="pwaManifest">
<meta name="theme-color" content="#0A0A0B" id="pwaThemeColor">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Taomly" id="pwaTitle">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png">
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  /* ── Тёмная основа Taomly — неизменна ── */
  --void:        #0A0A0B;
  --depth:       #111114;
  --surface:     #16161A;
  --card:        #1C1C21;
  --card-hover:  #202026;
  --rim:         rgba(255,255,255,0.06);
  --rim-strong:  rgba(255,255,255,0.10);
  --glass:       rgba(22,22,26,0.82);

  /* ── Текст ── */
  --ink:         #F0EEE8;
  --ink-mid:     #9A9898;
  --ink-soft:    #5C5B5B;
  --ink-ghost:   rgba(240,238,232,0.08);

  /* ── Акцент ресторана (переопределяется applyBrandTheme) ── */
  --accent:      #C9A96E;
  --accent-dim:  rgba(201,169,110,0.12);
  --accent-glow: rgba(201,169,110,0.20);

  /* ── Геометрия ── */
  --r-xl:  20px;
  --r-lg:  16px;
  --r-md:  12px;
  --r-sm:   8px;

  /* ── Тени ── */
  --shadow-card: 0 1px 0 var(--rim), 0 8px 32px rgba(0,0,0,0.32);
  --shadow-float: 0 24px 64px rgba(0,0,0,0.6), 0 1px 0 var(--rim-strong);
  --shadow-accent: 0 8px 32px var(--accent-glow);
}

html { background: var(--void); }

body {
  font-family: 'Inter', sans-serif;
  background: var(--void);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

svg { display: block; }
.icon {
  width: 18px; height: 18px;
  stroke: currentColor; stroke-width: 1.5;
  fill: none; stroke-linecap: round; stroke-linejoin: round;
}

/* ══════════════════════════════════════════
   SPLASH — первые секунды впечатления
══════════════════════════════════════════ */
#splash {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--void);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 0.7s cubic-bezier(0.4,0,0.2,1);
}
#splash.hidden { opacity: 0; pointer-events: none; }

.splash-inner { text-align: center; }

.splash-logo-ring {
  width: 72px; height: 72px;
  border-radius: 22px;
  background: var(--card);
  border: 1px solid var(--rim-strong);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 28px;
  position: relative;
  animation: splashRingIn 0.8s cubic-bezier(0.22,1,0.36,1) both;
}
.splash-logo-ring::before {
  content: '';
  position: absolute; inset: -1px;
  border-radius: 23px;
  background: linear-gradient(135deg, var(--accent), transparent 60%);
  opacity: 0.5;
  z-index: -1;
}
.splash-logo-ring .icon { width: 28px; height: 28px; stroke: var(--accent); stroke-width: 1.3; }

@keyframes splashRingIn {
  from { transform: scale(0.85) translateY(8px); opacity: 0; }
  to   { transform: scale(1) translateY(0); opacity: 1; }
}

.splash-wordmark {
  font-family: 'Cormorant Garamond', serif;
  font-size: 42px;
  font-weight: 300;
  letter-spacing: 8px;
  text-transform: uppercase;
  color: var(--ink);
  opacity: 0;
  animation: splashWordIn 0.6s cubic-bezier(0.22,1,0.36,1) 0.2s both;
}
@keyframes splashWordIn {
  from { opacity: 0; letter-spacing: 14px; }
  to   { opacity: 1; letter-spacing: 8px; }
}

.splash-beam {
  width: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  margin: 18px auto 16px;
  animation: splashBeam 0.8s ease 0.5s both;
}
@keyframes splashBeam {
  from { width: 0; opacity: 0; }
  to   { width: 80px; opacity: 1; }
}

.splash-sub {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--ink-soft);
  font-weight: 500;
  opacity: 0;
  animation: fadeSlideUp 0.5s ease 0.7s both;
}

.splash-dots {
  display: flex; gap: 6px; justify-content: center;
  margin-top: 52px;
}
.splash-dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--ink-soft);
  animation: dotPulse 1.4s ease infinite;
}
.splash-dot:nth-child(2) { animation-delay: 0.2s; }
.splash-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotPulse {
  0%, 100% { opacity: 0.3; transform: scale(1); }
  50%       { opacity: 1;   transform: scale(1.3); background: var(--accent); }
}

/* ══════════════════════════════════════════
   HEADER — sticky, glass
══════════════════════════════════════════ */
.header {
  position: sticky; top: 0; z-index: 100;
  background: var(--glass);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border-bottom: 1px solid var(--rim);
  padding: 0 20px;
}

/* Ресторан-строка */
.restaurant-row {
  display: flex; align-items: center; gap: 14px;
  padding: 18px 0 16px;
}

.restaurant-logo {
  width: 48px; height: 48px; border-radius: 14px;
  background: var(--card);
  border: 1px solid var(--rim-strong);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; overflow: hidden;
  position: relative;
}
.restaurant-logo::after {
  content: '';
  position: absolute; inset: 0; border-radius: 14px;
  background: linear-gradient(135deg, var(--accent-dim), transparent);
  pointer-events: none;
}
.restaurant-logo img { width: 100%; height: 100%; object-fit: cover; }
.restaurant-logo-letter {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px; font-weight: 400;
  color: var(--accent);
  letter-spacing: 1px;
}

.restaurant-meta { flex: 1; min-width: 0; }
.restaurant-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px; font-weight: 500;
  color: var(--ink); letter-spacing: 0.3px;
  line-height: 1.15;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.restaurant-address {
  font-size: 12px; color: var(--ink-soft);
  margin-top: 2px;
  display: flex; align-items: center; gap: 4px;
}
.restaurant-address .icon { width: 11px; height: 11px; flex-shrink: 0; }

.table-badge {
  display: inline-flex; align-items: center; gap: 5px;
  margin-top: 6px; padding: 3px 10px;
  border-radius: 100px;
  background: var(--accent-dim);
  border: 1px solid rgba(201,169,110,0.2);
  font-size: 11px; font-weight: 600;
  color: var(--accent); letter-spacing: 0.3px;
}
.table-badge .icon { width: 11px; height: 11px; }

/* Приветствие */
.welcome-line {
  padding-bottom: 16px;
  border-bottom: 1px solid var(--rim);
  margin-bottom: 0;
}
.welcome-text {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-size: 15px; font-weight: 300;
  color: var(--ink-mid); line-height: 1.5;
}

/* Popular horizontal scroll */
.popular-section { padding: 18px 0 6px; }
.popular-label {
  font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--ink-soft); font-weight: 600;
  margin-bottom: 12px;
}
.popular-scroll {
  display: flex; gap: 10px;
  overflow-x: auto; scrollbar-width: none;
  padding-bottom: 2px;
  margin: 0 -20px; padding-left: 20px; padding-right: 20px;
}
.popular-scroll::-webkit-scrollbar { display: none; }

.popular-chip {
  flex-shrink: 0;
  display: flex; flex-direction: column;
  width: 120px; border-radius: var(--r-md);
  background: var(--card);
  border: 1px solid var(--rim);
  overflow: hidden; cursor: pointer;
  transition: transform 0.2s ease, border-color 0.2s ease;
}
.popular-chip:active { transform: scale(0.96); }
.popular-chip-img {
  width: 100%; height: 72px;
  background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.popular-chip-img img { width: 100%; height: 100%; object-fit: cover; }
.popular-chip-img .icon { width: 22px; height: 22px; stroke: var(--ink-soft); }
.popular-chip-body { padding: 8px 10px 9px; }
.popular-chip-name {
  font-size: 12px; font-weight: 500; color: var(--ink);
  line-height: 1.3;
  overflow: hidden; display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical;
}
.popular-chip-price {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--accent);
  margin-top: 4px; letter-spacing: -0.3px;
}

/* Categories nav */
.categories-nav {
  display: flex; gap: 0;
  overflow-x: auto; scrollbar-width: none;
  border-top: 1px solid var(--rim);
  margin: 0 -20px; padding: 0 20px;
}
.categories-nav::-webkit-scrollbar { display: none; }

.cat-btn {
  flex-shrink: 0; padding: 14px 18px 13px;
  border: none; background: none;
  font-family: 'Inter', sans-serif;
  font-size: 13px; font-weight: 500;
  color: var(--ink-soft); cursor: pointer;
  white-space: nowrap;
  position: relative;
  transition: color 0.2s ease;
}
.cat-btn::after {
  content: ''; position: absolute;
  bottom: 0; left: 18px; right: 18px; height: 2px;
  background: var(--accent);
  border-radius: 2px 2px 0 0;
  transform: scaleX(0);
  transition: transform 0.25s cubic-bezier(0.22,1,0.36,1);
}
.cat-btn.active { color: var(--ink); }
.cat-btn.active::after { transform: scaleX(1); }

/* ══════════════════════════════════════════
   MAIN — контент меню
══════════════════════════════════════════ */
.main { padding: 28px 20px 160px; }

.category-section { margin-bottom: 48px; scroll-margin-top: 160px; }

.category-heading {
  display: flex; align-items: baseline; gap: 10px;
  margin-bottom: 20px;
}
.category-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px; font-weight: 400;
  color: var(--ink); letter-spacing: 0.2px;
}
.category-count {
  font-size: 12px; color: var(--ink-soft);
  font-weight: 400;
}

.products-grid { display: flex; flex-direction: column; gap: 12px; }

/* ══════════════════════════════════════════
   PRODUCT CARD
══════════════════════════════════════════ */
.product-card {
  background: var(--card);
  border-radius: var(--r-xl);
  border: 1px solid var(--rim);
  overflow: hidden; cursor: pointer;
  box-shadow: var(--shadow-card);
  opacity: 0; transform: translateY(12px);
  animation: cardReveal 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}
@keyframes cardReveal {
  to { opacity: 1; transform: translateY(0); }
}
.product-card:active { transform: scale(0.99); border-color: var(--rim-strong); }

/* Карточка с фото — фото сверху */
.product-card.has-photo { display: flex; flex-direction: column; }
.product-card-photo {
  width: 100%; height: 200px;
  overflow: hidden; position: relative;
  background: var(--surface);
}
.product-card-photo img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.5s cubic-bezier(0.22,1,0.36,1);
  display: block;
}
.product-card:active .product-card-photo img { transform: scale(1.03); }

/* Карточка без фото — горизонтальная */
.product-card.no-photo {
  display: flex; align-items: center; gap: 0;
  padding: 0;
}
.product-card.no-photo .product-body { padding: 18px 20px; }

.product-body { padding: 16px 18px 18px; flex: 1; }

.product-badge-row { margin-bottom: 7px; }
.product-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 100px;
  font-size: 9.5px; font-weight: 600;
  letter-spacing: 0.8px; text-transform: uppercase;
  background: var(--accent-dim);
  border: 1px solid rgba(201,169,110,0.2);
  color: var(--accent);
}

.product-name {
  font-size: 16px; font-weight: 600;
  color: var(--ink); line-height: 1.35;
  margin-bottom: 5px;
}
.product-desc {
  font-size: 13px; color: var(--ink-soft); line-height: 1.55;
  margin-bottom: 14px;
  overflow: hidden; display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical;
}
.product-footer {
  display: flex; align-items: center;
  justify-content: space-between; gap: 12px;
}
.product-price {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px; font-weight: 500;
  color: var(--ink); letter-spacing: -0.5px;
  line-height: 1;
}
.product-price-sub {
  font-family: 'Inter', sans-serif;
  font-size: 10px; color: var(--ink-soft);
  font-weight: 400; letter-spacing: 0.5px;
  text-transform: uppercase; margin-top: 3px;
}

/* Кнопка добавить */
.add-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--accent-dim);
  border: 1px solid rgba(201,169,110,0.25);
  color: var(--accent);
  cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content:center;
  transition: background 0.18s ease, transform 0.15s ease, box-shadow 0.18s ease;
}
.add-btn .icon { width: 16px; height: 16px; stroke-width: 2; }
.add-btn:active { transform: scale(0.9); background: var(--accent); color: var(--void); box-shadow: var(--shadow-accent); }

/* Счётчик */
.qty-control {
  display: flex; align-items: center; gap: 12px;
}
.qty-btn {
  width: 28px; height: 28px; border-radius: 50%;
  border: 1px solid var(--rim-strong);
  background: var(--surface);
  color: var(--ink-mid);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.15s ease, border-color 0.15s ease;
}
.qty-btn:active { opacity: 0.5; }
.qty-btn .icon { width: 12px; height: 12px; }
.qty-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px; font-weight: 600; color: var(--ink);
  min-width: 20px; text-align: center;
  animation: qtyPop 0.2s cubic-bezier(0.22,1,0.36,1);
}
@keyframes qtyPop { from { transform: scale(1.25); } to { transform: scale(1); } }

/* ══════════════════════════════════════════
   SKELETON LOADING
══════════════════════════════════════════ */
.skeleton-wrap { display: flex; flex-direction: column; gap: 12px; }
.skeleton-card {
  background: var(--card);
  border-radius: var(--r-xl);
  border: 1px solid var(--rim);
  overflow: hidden;
}
.skeleton-photo { width: 100%; height: 200px; }
.skeleton-body { padding: 16px 18px 18px; display: flex; flex-direction: column; gap: 10px; }
.skeleton-block {
  background: linear-gradient(90deg,
    var(--surface) 0%, var(--card-hover) 40%, var(--surface) 80%);
  background-size: 300% 100%;
  animation: shimmer 1.6s ease infinite;
  border-radius: 6px;
}
@keyframes shimmer {
  0%   { background-position: 100% 50%; }
  100% { background-position: -50% 50%; }
}
.skeleton-line { height: 12px; border-radius: 6px; }
.skeleton-line.w30 { width: 30%; }
.skeleton-line.w70 { width: 70%; }
.skeleton-line.w50 { width: 50%; height: 18px; }

/* ══════════════════════════════════════════
   CART BAR — плавающая капсула
══════════════════════════════════════════ */
.cart-bar {
  position: fixed; bottom: 28px; left: 20px; right: 20px;
  z-index: 200; pointer-events: none;
  transform: translateY(120%);
  transition: transform 0.4s cubic-bezier(0.22,1,0.36,1);
}
.cart-bar.visible { transform: translateY(0); pointer-events: all; }

.cart-btn {
  width: 100%;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px;
  background: var(--accent);
  border: none; border-radius: var(--r-xl);
  cursor: pointer;
  box-shadow: var(--shadow-accent), 0 16px 40px rgba(0,0,0,0.4);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.cart-btn:active { transform: scale(0.98); }

.cart-btn-left { display: flex; align-items: center; gap: 10px; }
.cart-count-pill {
  background: rgba(0,0,0,0.2);
  border-radius: 100px; padding: 3px 9px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px; font-weight: 600;
  color: var(--void);
}
.cart-label {
  font-size: 14px; font-weight: 700;
  color: var(--void); letter-spacing: 0.2px;
}
.cart-total {
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px; font-weight: 600;
  color: var(--void); letter-spacing: -0.3px;
}

/* ══════════════════════════════════════════
   SCREENS
══════════════════════════════════════════ */
.screen {
  display: none; position: fixed; inset: 0;
  background: var(--void); z-index: 300;
  overflow-y: auto; overflow-x: hidden;
  animation: screenIn 0.35s cubic-bezier(0.22,1,0.36,1);
}
.screen.active { display: block; }
@keyframes screenIn {
  from { transform: translateY(28px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}

.screen-header {
  position: sticky; top: 0; z-index: 10;
  background: var(--glass);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--rim);
  padding: 16px 20px;
  display: flex; align-items: center; gap: 14px;
}
.back-btn {
  width: 40px; height: 40px; border-radius: var(--r-md);
  border: 1px solid var(--rim-strong);
  background: var(--card); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-mid); flex-shrink: 0;
  transition: background 0.15s ease, transform 0.1s ease;
}
.back-btn:active { background: var(--card-hover); transform: scale(0.9); }
.back-btn .icon { width: 17px; height: 17px; }
.screen-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px; font-weight: 400; color: var(--ink);
}

/* ══════════════════════════════════════════
   CART SCREEN
══════════════════════════════════════════ */
.cart-items-list { padding: 16px 20px 0; display: flex; flex-direction: column; gap: 8px; }

.cart-item {
  background: var(--card);
  border: 1px solid var(--rim);
  border-radius: var(--r-lg);
  padding: 14px 16px;
  display: flex; align-items: center; gap: 14px;
  animation: cardReveal 0.3s ease;
}
.cart-item-icon {
  width: 44px; height: 44px; border-radius: var(--r-md);
  background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.cart-item-icon .icon { width: 18px; height: 18px; stroke: var(--accent); stroke-width: 1.3; }
.cart-item-info { flex: 1; min-width: 0; }
.cart-item-name { font-size: 14px; font-weight: 600; color: var(--ink); }
.cart-item-price {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; color: var(--ink-soft); margin-top: 3px;
}

/* Order type */
.order-type-section { padding: 20px 20px 0; }
.section-eyebrow {
  font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--ink-soft); font-weight: 600; margin-bottom: 12px;
}
.order-type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.type-btn {
  padding: 16px 12px; border-radius: var(--r-lg);
  border: 1px solid var(--rim);
  background: var(--card); text-align: center; cursor: pointer;
  transition: all 0.2s ease;
}
.type-btn.active {
  border-color: var(--accent);
  background: var(--accent-dim);
  box-shadow: 0 0 0 1px var(--accent);
}
.type-btn-icon { margin: 0 auto 9px; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
.type-btn-icon .icon { width: 22px; height: 22px; stroke: var(--accent); }
.type-btn-label { font-size: 13px; font-weight: 600; color: var(--ink); }

.table-banner {
  margin: 16px 20px 0;
  padding: 16px;
  background: var(--accent-dim);
  border: 1px solid rgba(201,169,110,0.2);
  border-radius: var(--r-lg);
  display: flex; align-items: center; gap: 14px;
}
.table-banner-icon {
  width: 40px; height: 40px; border-radius: var(--r-md);

<script>
const API_BASE = '';
const DEFAULT_SLUG = 'chinar';

let restaurant = null;
let cart = {};
let orderType = 'delivery';
let tableNumber = null;
let tableDbId = null;
let restaurantSlug = DEFAULT_SLUG;

function parseParams() {
  const urlParams = new URLSearchParams(window.location.search);
  const slugParam = urlParams.get('slug');
  const tableParam = urlParams.get('table');
  if (slugParam) {
    restaurantSlug = slugParam;
    if (tableParam) { tableNumber = tableParam; orderType = 'dine_in'; }
    return;
  }
  const tg = window.Telegram?.WebApp;
  const startParam = tg?.initDataUnsafe?.start_param || '';
  if (startParam) {
    const parts = startParam.split('_');
    if (parts.length >= 2 && !isNaN(parts[parts.length - 1])) {
      tableNumber = parts[parts.length - 1];
      restaurantSlug = parts.slice(0, -1).join('_');
      orderType = 'dine_in';
    } else { restaurantSlug = startParam; }
  }
}

function fmt(p) { return p.toLocaleString('uz-UZ') + ' so\'m'; }
function fmtMono(p) { return p.toLocaleString('uz-UZ'); }

/* ── applyBrandTheme — только акцент, тёмная основа неизменна ── */
function applyBrandTheme(r) {
  const root = document.documentElement;

  let accentHex = null;

  // Приоритет: primary_color → accent_color
  if (r.primary_color) accentHex = r.primary_color;
  else if (r.accent_color) accentHex = r.accent_color;

  if (accentHex) {
    // Проверяем контраст на тёмном фоне: если цвет слишком тёмный — осветляем
    const accessible = _ensureContrast(accentHex, '#0A0A0B', 3.5);
    root.style.setProperty('--accent',      accessible);
    root.style.setProperty('--accent-dim',  _hexToRgba(accessible, 0.10));
    root.style.setProperty('--accent-glow', _hexToRgba(accessible, 0.22));

    const tc = document.getElementById('pwaThemeColor');
    if (tc) tc.setAttribute('content', '#0A0A0B'); // тема всегда тёмная
  }

  if (r.name) {
    const pt = document.getElementById('pwaTitle');
    if (pt) pt.setAttribute('content', r.name);
    document.title = r.name;
    document.getElementById('splashName').textContent = r.name.toUpperCase();
  }

  if (restaurantSlug) {
    const ml = document.getElementById('pwaManifest');
    if (ml) ml.setAttribute('href', `/manifest/${restaurantSlug}.json`);
  }
}

function _hexToRgba(hex, alpha) {
  if (!hex || hex.length < 7) return `rgba(201,169,110,${alpha})`;
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

/* Относительная яркость для контраста WCAG */
function _relativeLuminance(hex) {
  if (!hex || hex.length < 7) return 0;
  const vals = [hex.slice(1,3), hex.slice(3,5), hex.slice(5,7)]
    .map(h => { const v = parseInt(h,16)/255; return v<=0.03928 ? v/12.92 : Math.pow((v+0.055)/1.055,2.4); });
  return 0.2126*vals[0] + 0.7152*vals[1] + 0.0722*vals[2];
}

function _contrastRatio(hex1, hex2) {
  const l1 = _relativeLuminance(hex1);
  const l2 = _relativeLuminance(hex2);
  return (Math.max(l1,l2)+0.05) / (Math.min(l1,l2)+0.05);
}

/* Осветляем акцент пока контраст не достигнет минимума */
function _ensureContrast(accentHex, bgHex, minRatio) {
  if (!accentHex || accentHex.length < 7) return '#C9A96E';
  let hex = accentHex;
  let attempts = 0;
  while (_contrastRatio(hex, bgHex) < minRatio && attempts < 20) {
    hex = _lighten(hex, 12);
    attempts++;
  }
  return hex;
}

function _lighten(hex, amount) {
  if (!hex || hex.length < 7) return hex;
  const r = Math.min(255, parseInt(hex.slice(1,3),16)+amount);
  const g = Math.min(255, parseInt(hex.slice(3,5),16)+amount);
  const b = Math.min(255, parseInt(hex.slice(5,7),16)+amount);
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

async function loadMenu() {
  try {
    const res = await fetch(`${API_BASE}/api/restaurants/${restaurantSlug}`);
    if (!res.ok) throw new Error('Server xatosi');
    restaurant = await res.json();

    applyBrandTheme(restaurant);

    document.getElementById('restaurantName').textContent = restaurant.name;

    const addrEl = document.getElementById('restaurantAddress');
    const addrText = document.getElementById('restaurantAddressText');
    if (restaurant.address) {
      addrText.textContent = restaurant.address;
      addrEl.style.display = 'flex';
    }

    // Логотип
    const logoWrap = document.getElementById('restaurantLogo');
    if (restaurant.logo_url) {
      logoWrap.innerHTML = `<img src="${restaurant.logo_url}" alt="${restaurant.name}">`;
    } else {
      const letter = restaurant.name ? restaurant.name[0].toUpperCase() : 'T';
      logoWrap.innerHTML = `<div class="restaurant-logo-letter">${letter}</div>`;
    }

    // Приветствие
    if (restaurant.welcome_text) {
      document.getElementById('welcomeText').textContent = restaurant.welcome_text;
      document.getElementById('welcomeLine').style.display = 'block';
    }

    if (tableNumber) {
      document.getElementById('tableBadgeText').textContent = 'Stol №' + tableNumber;
      document.getElementById('tableBadge').style.display = 'inline-flex';
      await resolveTableId();
    }

    renderPopular();
    renderCategories();
    renderMenu();

    setTimeout(() => {
      document.getElementById('splash').classList.add('hidden');
    }, 1600);

  } catch(e) {
    document.getElementById('menuContent').innerHTML = `
      <div class="error-state">
        <svg class="icon error-state-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
        Menyu yuklanmadi.<br>Qayta urinib ko'ring.
      </div>`;
    document.getElementById('splash').classList.add('hidden');
  }
}

// Popular — блюда с is_popular=true
function renderPopular() {
  const section = document.getElementById('popularSection');
  const scroll = document.getElementById('popularScroll');
  const items = [];
  (restaurant.categories||[]).forEach(cat => {
    (cat.products||[]).forEach(p => {
      if (p.is_popular) items.push(p);
    });
  });
  if (items.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  scroll.innerHTML = '';
  items.forEach(p => {
    const chip = document.createElement('div');
    chip.className = 'popular-chip';
    chip.onclick = () => openProductModal(p.id);
    const imgHtml = p.photo_url
      ? `<img src="${p.photo_url}" alt="${p.name}">`
      : `<svg class="icon" viewBox="0 0 24 24"><path d="M18 8a4 4 0 0 1 0 8M6 4v16M6 4c0 2.5 2.5 2.5 2.5 5S6 11.5 6 14"/></svg>`;
    chip.innerHTML = `
      <div class="popular-chip-img">${imgHtml}</div>
      <div class="popular-chip-body">
        <div class="popular-chip-name">${p.name}</div>
        <div class="popular-chip-price">${fmtMono(p.price)}</div>
      </div>`;
    scroll.appendChild(chip);
  });
}

async function resolveTableId() {
  try {
    const res = await fetch(`${API_BASE}/api/restaurants/${restaurantSlug}/table/${tableNumber}`);
    if (res.ok) { const data = await res.json(); tableDbId = data.table_id; }
  } catch(e) { tableDbId = null; }
}

function renderCategories() {
  const nav = document.getElementById('categoriesNav');
  nav.innerHTML = '';
  (restaurant.categories||[]).forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (i===0 ? ' active' : '');
    btn.textContent = cat.name;
    btn.onclick = () => {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const el = document.getElementById('cat-'+cat.id);
      if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
    };
    nav.appendChild(btn);
  });
}

let cardAnimIdx = 0;

function renderMenu() {
  const content = document.getElementById('menuContent');
  content.innerHTML = '';
  cardAnimIdx = 0;
  (restaurant.categories||[]).forEach(cat => {
    if (!cat.products||cat.products.length===0) return;
    const sec = document.createElement('div');
    sec.className = 'category-section';
    sec.id = 'cat-'+cat.id;
    sec.innerHTML = `
      <div class="category-heading">
        <div class="category-title">${cat.name}</div>
        <div class="category-count">${cat.products.length} ta</div>
      </div>
      <div class="products-grid" id="grid-${cat.id}"></div>`;
    content.appendChild(sec);
    const grid = sec.querySelector('#grid-'+cat.id);
    cat.products.forEach(p => grid.appendChild(makeCard(p)));
  });
}

const BADGE_DEFS = {
  bestseller: { label: 'Bestseller' },
  chef:       { label: 'Chef\'s Choice' },
  new:        { label: 'New' },
  spicy:      { label: '🌶 Spicy' },
};

function extractBadge(description) {
  if (!description) return { badge: null, text: '' };
  const match = description.match(/#(bestseller|chef|new|spicy)\b/i);
  if (!match) return { badge: null, text: description };
  const key = match[1].toLowerCase();
  const text = description.replace(match[0], '').trim();
  return { badge: BADGE_DEFS[key], text };
}

function makeCard(p) {
  const div = document.createElement('div');
  const hasPhoto = !!p.photo_url;
  div.className = 'product-card ' + (hasPhoto ? 'has-photo' : 'no-photo');
  div.id = 'card-' + p.id;
  div.style.animationDelay = (cardAnimIdx++ % 10) * 0.05 + 's';
  div.onclick = () => openProductModal(p.id);

  const qty = cart[p.id]?.qty || 0;
  const { badge, text: descText } = extractBadge(p.description);
  const badgeHtml = badge ? `<div class="product-badge-row"><span class="product-badge">${badge.label}</span></div>` : '';

  if (hasPhoto) {
    div.innerHTML = `
      <div class="product-card-photo">
        <img src="${p.photo_url}" alt="${p.name}" loading="lazy">
      </div>
      <div class="product-body">
        ${badgeHtml}
        <div class="product-name">${p.name}</div>
        ${descText ? `<div class="product-desc">${descText}</div>` : ''}
        <div class="product-footer">
          <div>
            <div class="product-price">${fmtMono(p.price)}</div>
            <div class="product-price-sub">so'm</div>
          </div>
          <div id="ctrl-${p.id}" onclick="event.stopPropagation()">${ctrlHtml(p, qty)}</div>
        </div>
      </div>`;
  } else {
    div.innerHTML = `
      <div class="product-body">
        ${badgeHtml}
        <div class="product-name">${p.name}</div>
        ${descText ? `<div class="product-desc">${descText}</div>` : ''}
        <div class="product-footer">
          <div>
            <div class="product-price">${fmtMono(p.price)}</div>
            <div class="product-price-sub">so'm</div>
          </div>
          <div id="ctrl-${p.id}" onclick="event.stopPropagation()">${ctrlHtml(p, qty)}</div>
        </div>
      </div>`;
  }
  return div;
}

function ctrlHtml(p, qty) {
  if (qty === 0) return `<button class="add-btn" onclick="event.stopPropagation();addItem(${p.id})"><svg class="icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>`;
  return `<div class="qty-control">
    <button class="qty-btn" onclick="changeQty(${p.id},-1)"><svg class="icon" viewBox="0 0 24 24"><path d="M5 12h14"/></svg></button>
    <span class="qty-num">${qty}</span>
    <button class="qty-btn" onclick="changeQty(${p.id},1)"><svg class="icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
  </div>`;
}

function findProduct(id) {
  for (const cat of (restaurant?.categories||[])) {
    const p = cat.products.find(p => p.id === id);
    if (p) return p;
  }
  return null;
}

function addItem(id) {
  const p = findProduct(id); if (!p) return;
  cart[id] = { id, name:p.name, price:p.price, qty:1 };
  refreshCtrl(id); updateBar();
}

function changeQty(id, delta) {
  if (!cart[id]) return;
  cart[id].qty += delta;
  if (cart[id].qty <= 0) delete cart[id];
  refreshCtrl(id); updateBar();
  if (productModalCurrentId === id) refreshModalCtrl();
}

function refreshCtrl(id) {
  const el = document.getElementById('ctrl-'+id); if (!el) return;
  const p = findProduct(id); if (!p) return;
  el.innerHTML = ctrlHtml(p, cart[id]?.qty||0);
}

/* ── PRODUCT MODAL ── */
let productModalCurrentId = null;

function openProductModal(id) {
  const p = findProduct(id); if (!p) return;
  productModalCurrentId = id;
  const { badge, text: descText } = extractBadge(p.description);

  const imgWrap = document.getElementById('productModalImg');
  if (p.photo_url) {
    imgWrap.className = 'modal-img';
    imgWrap.innerHTML = `<img src="${p.photo_url}" alt="${p.name}">`;
  } else {
    imgWrap.className = 'modal-img no-img';
    imgWrap.innerHTML = '';
  }

  document.getElementById('productModalBadge').innerHTML = badge ? `<span class="product-badge">${badge.label}</span>` : '';
  document.getElementById('productModalName').textContent = p.name;
  document.getElementById('productModalDesc').textContent = descText||'';
  document.getElementById('productModalPrice').textContent = fmtMono(p.price);
  refreshModalCtrl();
  document.getElementById('productModalOverlay').classList.add('active');
}

function refreshModalCtrl() {
  const id = productModalCurrentId;
  const p = findProduct(id); if (!p) return;
  const qty = cart[id]?.qty||0;
  const ctrl = document.getElementById('productModalCtrl');
  if (qty === 0) {
    ctrl.innerHTML = `<button class="modal-add-btn" onclick="addItem(${id});refreshModalCtrl()">
      <svg class="icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> Qo'shish
    </button>`;
  } else {
    ctrl.innerHTML = `<div class="modal-qty">
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty(${id},-1)"><svg class="icon" viewBox="0 0 24 24"><path d="M5 12h14"/></svg></button>
        <span class="qty-num">${qty}</span>
        <button class="qty-btn" onclick="changeQty(${id},1)"><svg class="icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
      </div>
    </div>`;
  }
}

function closeProductModal() {
  document.getElementById('productModalOverlay').classList.remove('active');
  productModalCurrentId = null;
}

function cartItems() { return Object.values(cart); }
function cartTotal() { return cartItems().reduce((s,i) => s+i.price*i.qty, 0); }
function cartCount() { return cartItems().reduce((s,i) => s+i.qty, 0); }

function updateBar() {
  const n = cartCount();
  document.getElementById('cartCountBadge').textContent = n;
  document.getElementById('cartTotalBar').textContent = fmtMono(cartTotal());
  document.getElementById('cartBar').classList.toggle('visible', n>0);
}

function openCart() { renderCart(); document.getElementById('cartScreen').classList.add('active'); }
function closeCart() { document.getElementById('cartScreen').classList.remove('active'); }

function selectType(type) {
  orderType = type;
  document.getElementById('typeDelivery').classList.toggle('active', type==='delivery');
  document.getElementById('typeTakeaway').classList.toggle('active', type==='takeaway');
  document.getElementById('clientAddress').style.display = type==='delivery' ? 'block' : 'none';
}

function renderCart() {
  const list = document.getElementById('cartItemsList');
  list.innerHTML = '';
  cartItems().forEach(item => {
    const div = document.createElement('div');
    div.className = 'cart-item';
    div.innerHTML = `
      <div class="cart-item-icon">
        <svg class="icon" viewBox="0 0 24 24"><path d="M18 8a4 4 0 0 1 0 8M6 4v16M6 4c0 2.5 2.5 2.5 2.5 5S6 11.5 6 14"/></svg>
      </div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">${item.qty} × ${fmt(item.price)}</div>
      </div>
      <div class="qty-control">
        <button class="qty-btn" onclick="cartChangeQty(${item.id},-1)"><svg class="icon" viewBox="0 0 24 24"><path d="M5 12h14"/></svg></button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn" onclick="cartChangeQty(${item.id},1)"><svg class="icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
      </div>`;
    list.appendChild(div);
  });

  document.getElementById('summaryCount').textContent = cartCount() + ' ta taom';
  document.getElementById('summarySubtotal').textContent = fmt(cartTotal());
  document.getElementById('summaryTotal').textContent = fmtMono(cartTotal());

  if (orderType === 'dine_in') {
    document.getElementById('orderTypeSection').style.display = 'none';
    document.getElementById('clientAddress').style.display = 'none';
    document.getElementById('clientName').style.display = 'none';
    document.getElementById('clientPhone').style.display = 'none';
    document.getElementById('tableBanner').style.display = 'flex';
    document.getElementById('tableBannerTitle').textContent = 'Stol №'+tableNumber;
  } else {
    document.getElementById('orderTypeSection').style.display = 'block';
    document.getElementById('tableBanner').style.display = 'none';
    document.getElementById('clientName').style.display = 'block';
    document.getElementById('clientPhone').style.display = 'block';
    document.getElementById('clientAddress').style.display = orderType==='delivery' ? 'block' : 'none';
  }
}

function cartChangeQty(id, delta) {
  changeQty(id, delta);
  if (cartCount()===0) { closeCart(); return; }
  renderCart();
}

async function submitOrder() {
  const btn = document.getElementById('checkoutBtn');
  const name = document.getElementById('clientName').value.trim();
  const phone = document.getElementById('clientPhone').value.trim();
  const address = document.getElementById('clientAddress').value.trim();
  const comment = document.getElementById('clientComment').value.trim();

  if (orderType !== 'dine_in') {
    if (!name) { alert('Ismingizni kiriting'); return; }
    if (!phone||phone==='+998') { alert('Telefon raqamingizni kiriting'); return; }
  }
  if (orderType==='delivery'&&!address) { alert('Manzilni kiriting'); return; }

  const tg = window.Telegram?.WebApp;
  const initData = tg?.initData;
  if (!initData) { alert('Telegram Mini App dan foydalaning'); return; }

  btn.disabled = true;
  btn.textContent = 'Yuborilmoqda…';

  const payload = {
    client_name: name||null,
    client_phone: phone||null,
    order_type: orderType,
    address: orderType==='delivery' ? address : null,
    table_id: orderType==='dine_in' ? tableDbId : null,
    comment: comment||null,
    items: cartItems().map(i => ({ product_id:i.id, quantity:i.qty }))
  };

  try {
    const res = await fetch(`${API_BASE}/api/orders/`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Telegram-Init-Data': initData,
        'X-Restaurant-Id': String(restaurant.id),
      },
      body: JSON.stringify(payload)
    });
    if (!res.ok) { const err = await res.json(); throw new Error(err.detail||'Xato'); }
    const order = await res.json();
    showSuccess(order.id);
  } catch(e) {
    alert('Xato: '+e.message);
    btn.disabled = false;
    btn.textContent = 'Buyurtma berish →';
  }
}

function showSuccess(orderId) {
  document.getElementById('successOrderId').textContent = '#'+String(orderId).padStart(4,'0');
  if (orderType==='dine_in') {
    document.getElementById('successSubtitle').textContent = 'Buyurtmangiz qabul qilindi! Tez orada stolga yetkaziladi';
  } else if (orderType==='takeaway') {
    document.getElementById('successSubtitle').textContent = "Tayyor bo'lganda xabar beramiz";
  } else {
    document.getElementById('successSubtitle').textContent = 'Tez orada yetkaziladi';
  }
  document.getElementById('cartScreen').classList.remove('active');
  document.getElementById('successScreen').classList.add('active');
  cart = {}; updateBar();
}

function backToMenu() {
  document.getElementById('successScreen').classList.remove('active');
  renderMenu();
}

window.addEventListener('DOMContentLoaded', () => {
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }
  parseParams();
  loadMenu();
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/static/sw.js')
      .then(reg => console.log('[SW]', reg.scope))
      .catch(err => console.warn('[SW] failed:', err));
  });
}

let _deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredInstallPrompt = e;
  const b = document.getElementById('installBanner');
  if (b) b.style.display = 'flex';
});
window.addEventListener('appinstalled', () => {
  _deferredInstallPrompt = null;
  const b = document.getElementById('installBanner');
  if (b) b.style.display = 'none';
});
</script>
